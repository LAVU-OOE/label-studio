<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LAVU OÖ - Etiketten-Druckstudio v8 (HERMA 4473)</title>
    <link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1a4b60" />
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <style>
        /* ==========================================
           BENUTZEROBERFLÄCHE (Wird nicht gedruckt)
           ========================================== */
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .main-card {
            background: #ffffff;
            width: 100%;
            max-width: 750px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(26, 75, 96, 0.08);
            padding: 35px;
            border: 1px solid #eef2f5;
        }

        /* App-Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .app-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-logo {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #1a4b60;
            box-shadow: 0 2px 8px rgba(26, 75, 96, 0.15);
        }

        .app-header-title {
            color: #1a4b60;
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1.1;
        }

        .app-header-subtitle {
            font-size: 0.85rem;
            color: #6cb4db;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-top: 3px;
        }

        .app-header-right {
            color: #27ae60;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e8f8f5;
            padding: 8px 16px;
            border-radius: 8px;
            border-left: 4px solid #27ae60;
            box-shadow: 0 2px 6px rgba(39, 174, 96, 0.04);
        }

        /* Dashboard */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 35px;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Linke Spalte: Miniaturansicht */
        .preview-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
        }

        .sidebar-title {
            font-size: 0.75rem;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .thumbnail-wrapper {
            position: relative;
            width: 168px;
            height: 238px;
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .thumbnail-wrapper:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px rgba(26, 75, 96, 0.15);
            border-color: #1a4b60;
        }

        .scaled-sheet-container {
            transform: scale(0.20);
            transform-origin: top left;
            width: 210mm;
            height: 297mm;
            pointer-events: none;
        }

        .thumbnail-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 75, 96, 0.9);
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            padding: 8px 0;
            transition: background 0.2s;
            backdrop-filter: blur(2px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .thumbnail-wrapper:hover .thumbnail-overlay {
            background: rgba(39, 174, 96, 0.95);
        }

        /* Rechte Spalte */
        .info-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .info-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 12px;
        }

        .frontpage-selection {
            margin-bottom: 18px;
            display: flex;
            flex-direction: column;
        }

        .frontpage-selection label {
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .frontpage-selection select {
            padding: 12px 14px;
            border: 2px solid #6cb4db;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            color: #1a4b60;
            background-color: #fff;
            box-shadow: 0 2px 8px rgba(108, 180, 219, 0.1);
            transition: all 0.2s;
            cursor: pointer;
        }

        .frontpage-selection select:focus {
            outline: none;
            border-color: #1a4b60;
            box-shadow: 0 0 0 3px rgba(26, 75, 96, 0.15);
        }

        .summary-box {
            background: #f8fafc;
            border-left: 4px solid #6cb4db;
            padding: 16px 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 25px;
            border-top: 1px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
        }

        .summary-item {
            margin-bottom: 8px;
            font-size: 1rem;
            color: #334155;
        }
        .summary-item:last-child {
            margin-bottom: 0;
        }
        .summary-label {
            font-weight: 600;
            color: #1a4b60;
            width: 110px;
            display: inline-block;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background-color: #27ae60;
            color: white;
            flex: 2;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2);
        }

        .btn-primary:hover {
            background-color: #219653;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(39, 174, 96, 0.25);
        }

        .btn-secondary {
            background-color: #1a4b60;
            color: white;
            flex: 1;
            box-shadow: 0 4px 12px rgba(26, 75, 96, 0.15);
        }

        .btn-secondary:hover {
            background-color: #113342;
            transform: translateY(-1px);
        }

        /* Modals */
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 34, 43, 0.55);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 92%;
            max-width: 620px;
            box-shadow: 0 20px 40px rgba(15, 34, 43, 0.2);
            position: relative;
        }

        .preview-modal-content {
            max-width: 95vw;
            width: auto;
            height: 94vh;
            max-height: 94vh;
            display: flex;
            flex-direction: column;
            padding: 20px 30px;
            overflow: hidden;
        }

        .modal-body-scroll {
            flex: 1;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            position: relative;
        }

        .modal-header {
            font-size: 1.35rem;
            font-weight: bold;
            color: #1a4b60;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .btn-close-x {
            background: transparent;
            font-size: 1.8rem;
            color: #94a3b8;
            padding: 0;
            cursor: pointer;
            line-height: 1;
        }
        .btn-close-x:hover {
            color: #ef4444;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        input,
        select {
            padding: 11px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #334155;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #6cb4db;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(108, 180, 219, 0.15);
        }

        /* Sortiment Action-Row im Einstellungsfenster */
        .sortiment-crud-actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .btn-crud {
            padding: 8px 14px;
            font-size: 0.85rem;
            border-radius: 6px;
        }
        .btn-crud-add { background: #27ae60; color: white; }
        .btn-crud-add:hover { background: #219653; }
        .btn-crud-update { background: #f39c12; color: white; }
        .btn-crud-update:hover { background: #d35400; }
        .btn-crud-delete { background: #e74c3c; color: white; }
        .btn-crud-delete:hover { background: #c0392b; }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            gap: 20px;
            margin-top: 20px;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
            flex-shrink: 0;
        }

        .preview-footer-grid {
            display: flex;
            width: 100%;
            justify-content: space-between;
            align-items: flex-end;
            gap: 30px;
        }

        .preview-inputs-block {
            display: flex;
            gap: 16px;
            flex: 1;
            max-width: 450px;
        }

        .preview-inputs-block .form-group {
            flex: 1;
        }

        .btn-save-defaults {
            background-color: #3498db;
            color: white;
        }
        .btn-save-defaults:hover {
            background-color: #2980b9;
        }

        .btn-cancel {
            background-color: #f1f5f9;
            color: #475569;
        }
        .btn-cancel:hover {
            background-color: #e2e8f0;
        }

        /* ==========================================
           DRUCK-LAYOUT – HERMA 4473 (70 x 41 mm)
           ========================================== */
        .page-container {
            background: #ffffff;
            width: 210mm;
            height: 297mm;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.12);
            box-sizing: border-box;
            transform-origin: center center;
        }

        .print-sheet {
            width: 210mm;
            height: 297mm;
            box-sizing: border-box;
            padding: 5mm 0mm 5mm 0mm;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(7, 1fr);
            gap: 0;
            background: white;
        }

        .label {
            width: 100%;
            height: 100%;
            box-sizing: border-box;
            padding: 3.5mm 4mm 3.5mm 4mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
            background-color: #fff;
            border: 1px dashed #e2e8f0;
            overflow: hidden;
        }

        .label-top {
            text-align: right;
            font-size: 11pt;
            font-weight: bold;
            color: #1a4b60;
            letter-spacing: 0.3px;
        }

        .label-middle {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            margin-top: auto;
            margin-bottom: auto;
            white-space: nowrap;
        }

        .label-middle .num {
            font-size: 21pt;
            font-weight: bold;
            color: #54a0cc;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .label-middle .sep {
            font-size: 16pt;
            color: #1a4b60;
            font-weight: bold;
            margin: 0 5px;
        }

        .label-middle .suffix {
            font-size: 13pt;
            font-weight: bold;
            color: #1a4b60;
        }

        .label-bottom {
            font-size: 9pt;
            font-style: italic;
            text-align: right;
            color: #111111;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.1;
            letter-spacing: -0.1px;
        }

        .label.empty {
            border: 1px dashed #f8fafc;
            background-color: #fafbfc;
        }

        #hiddenPrintContainer {
            display: none;
        }

        @media (max-width: 700px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .preview-sidebar {
                order: -1;
            }
            .action-buttons {
                flex-direction: column;
            }
            .preview-footer-grid {
                flex-direction: column;
                align-items: stretch;
                gap: 15px;
            }
            .preview-inputs-block {
                max-width: 100%;
            }
        }

        @media print {
            body > :not(#hiddenPrintContainer) {
                display: none !important;
            }
            
            #hiddenPrintContainer {
                display: block !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
                width: 210mm !important;
                height: 297mm !important;
            }
            
            #labelSheetDirect {
                display: grid !important;
            }

            .label {
                border: 1px solid transparent !important;
            }
            
            @page {
                size: A4;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="main-card">

        <div class="app-header">
            <div class="app-header-left">
                <img class="app-logo" src="https://avatars.githubusercontent.com/u/297924413?s=400&u=9843148f4e4e6cd0cc18040131acc5403ef4a9ac&v=4" alt="Logo">
                <div>
                    <div class="app-header-title">LAVU OÖ</div>
                    <div class="app-header-subtitle">Etiketten-Druckstudio v8</div>
                </div>
            </div>
            <div class="app-header-right" id="headerStation">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                <span id="headerStationText">106 - ASZ Asten</span>
            </div>
        </div>

        <div class="dashboard-grid">

            <div class="preview-sidebar">
                <div class="sidebar-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    Live-Vorschau
                </div>
                <div class="thumbnail-wrapper" onclick="openPreviewModal()" title="Klicken für vollständige A4-Großansicht">
                    <div class="scaled-sheet-container">
                        <div class="print-sheet" id="thumbnailSheet"></div>
                    </div>
                    <div class="thumbnail-overlay">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                        Großansicht
                    </div>
                </div>
            </div>

            <div class="info-panel">
                <div class="frontpage-selection">
                    <label for="sortimentSelect">Abfallart aus Sortiment wählen:</label>
                    <select id="sortimentSelect" onchange="handlePresetSelection()"></select>
                </div>

                <div class="info-title">Aktuelle Konfiguration</div>

                <div class="summary-box">
                    <div class="summary-item"><span class="summary-label">Abfallart:</span> <span id="sumBezeichnung">-</span></div>
                    <div class="summary-item"><span class="summary-label">Artikel-Nr:</span> <span id="sumArtNr">-</span></div>
                    <div class="summary-item"><span class="summary-label">Zusatztext:</span> <span id="sumSuffix">-</span></div>
                    <div class="summary-item"><span class="summary-label">Menge / Start:</span> <span id="sumMenge">-</span></div>
                </div>

                <div class="action-buttons">
                    <button class="btn-primary" onclick="triggerDirectPrint()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                        Jetzt Ausdrucken
                    </button>

                    <button class="btn-secondary" onclick="openSettings()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                        Einstellungen
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div id="settingsModal" class="modal-backdrop" onclick="closeSettingsViaBackdrop(event)">
        <div class="modal-content">
            <div class="modal-header">
                <span>Druck- & Standorteinstellungen</span>
                <button class="btn-close-x" onclick="closeSettings()">&times;</button>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label for="inputTop">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    Standort (ASZ Niederlassung OÖ):
                </label>
                <input type="text" id="inputTop" list="standortOptionen" value="106 - ASZ Asten" oninput="updatePreview()" placeholder="Standort eingeben oder wählen..." />
                <datalist id="standortOptionen">
                    <option value="106 - ASZ Asten"></option>
                    <option value="ASZ Ansfelden"></option>
                    <option value="ASZ Enns"></option>
                    <option value="ASZ Hörsching"></option>
                    <option value="ASZ Leonding"></option>
                    <option value="ASZ Neuhofen"></option>
                    <option value="ASZ Pasching"></option>
                    <option value="ASZ St. Florian"></option>
                    <option value="ASZ Traun"></option>
                    <option value="ASZ Wilhering"></option>
                    <option value="ASZ Linz-Nebingerstraße"></option>
                    <option value="ASZ Linz-Mostnnystraße"></option>
                    <option value="ASZ Linz-Wiener Straße"></option>
                    <option value="ASZ Linz-Dornach"></option>
                </datalist>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="inputArtNr">Artikel-Nr.:</label>
                    <input type="text" id="inputArtNr" value="4040" oninput="updatePreview()" />
                </div>

                <div class="form-group">
                    <label for="inputSuffix">Zusatz Mitte:</label>
                    <input type="text" id="inputSuffix" value="QR-Box" oninput="updatePreview()" />
                </div>

                <div class="form-group full-width">
                    <label for="inputBezeichnung">Bezeichnung unten:</label>
                    <input type="text" id="inputBezeichnung" value="Elektro-Kleingeräte (ohne Akku)" oninput="updatePreview()" />
                </div>
            </div>

            <label style="margin-bottom: 10px;">Sortiment verwalten:</label>
            <div class="sortiment-crud-actions">
                <button class="btn-crud btn-crud-add" onclick="addCurrentAsNewArticle()">Als neuen Artikel speichern</button>
                <button class="btn-crud btn-crud-update" onclick="updateSelectedArticle()">Ausgewählten überschreiben</button>
                <button class="btn-crud btn-crud-delete" onclick="deleteSelectedArticle()">Ausgewählten löschen</button>
            </div>

            <div class="modal-footer">
                <button id="btnSaveDefaults" class="btn-save-defaults" onclick="saveDefaults()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                    Standard sichern
                </button>
                <button class="btn-cancel" onclick="closeSettings()">Fertig</button>
            </div>
        </div>
    </div>

    <div id="previewModal" class="modal-backdrop" onclick="closePreviewModalViaBackdrop(event)">
        <div class="modal-content preview-modal-content">
            <div class="modal-header">
                <span>Vollbild-Druckvorschau (A4-Bogen – HERMA 4473, 21 Etiketten)</span>
                <button class="btn-close-x" onclick="closePreviewModal()">&times;</button>
            </div>

            <div class="modal-body-scroll" id="modalBodyScroll">
                <div class="page-container" id="modalPageContainer">
                    <div class="print-sheet" id="labelSheetModal"></div>
                </div>
            </div>

            <div class="modal-footer">
                <div class="preview-footer-grid">
                    <div class="preview-inputs-block">
                        <div class="form-group">
                            <label for="inputCount">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="13" y2="17"/></svg>
                                Anzahl Etiketten (max. 21):
                            </label>
                            <input type="number" id="inputCount" value="9" min="1" max="21" oninput="updatePreview()" />
                        </div>

                        <div class="form-group">
                            <label for="inputStartPos">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                                Start-Position (1-21):
                            </label>
                            <input type="number" id="inputStartPos" value="1" min="1" max="21" oninput="updatePreview()" />
                        </div>
                    </div>

                    <button class="btn-primary" onclick="window.print()" style="height: 44px;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
                        Jetzt Ausdrucken
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="hiddenPrintContainer">
        <div class="page-container">
            <div class="print-sheet" id="labelSheetDirect"></div>
        </div>
    </div>

    <script>
        // ============================================================
        // SORTIMENT INITIAL-DATEN
        // ============================================================
        const defaultSortiment = [
            { artNr: "4040", bez: "Elektro-Kleingeräte (ohne Akku)", zusatzMitte: "QR-Box" },
            { artNr: "4010", bez: "Elektro-Großgeräte", zusatzMitte: "Gitterbox" },
            { artNr: "4020", bez: "Kühlgeräte", zusatzMitte: "Großteil" },
            { artNr: "4030", bez: "Bildschirmgeräte", zusatzMitte: "Gitterbox" },
            { artNr: "4015", bez: "Nachtspeicheröfen", zusatzMitte: "Spezial" },
            { artNr: "4050", bez: "Gasentladungslampen", zusatzMitte: "Karton" },
            { artNr: "3000", bez: "Altpapier (Deinking-Qualität)", zusatzMitte: "Container" },
            { artNr: "2100", bez: "Kartonagen (ARA-lizenziert)", zusatzMitte: "Presse" },
            { artNr: "3200", bez: "Alteisen", zusatzMitte: "Mulde" },
            { artNr: "3210", bez: "Nichteisen-Metalle", zusatzMitte: "Box" },
            { artNr: "3300", bez: "Altholz", zusatzMitte: "AII-Holz" },
            { artNr: "3400", bez: "Speisefett/-öl (Haushalts-Öl)", zusatzMitte: "Fass" },
            { artNr: "3500", bez: "Altreifen", zusatzMitte: "Stapel" },
            { artNr: "4300", bez: "Altlacke & Werkstättenabfälle", zusatzMitte: "Gefahrgut" },
            { artNr: "4320", bez: "Altöle", zusatzMitte: "Tank" }
        ];

        let sortimentData = [];

        window.onload = function() {
            loadSortiment();
            initDropdown();
            loadDefaults();
            window.addEventListener('resize', scaleModalPreview);
        };

        // Laden & Speichern des Sortiments aus dem LocalStorage
        function loadSortiment() {
            const savedSortiment = localStorage.getItem('lavu_studio_sortiment_v8');
            if (savedSortiment) {
                try {
                    sortimentData = JSON.parse(savedSortiment);
                } catch(e) {
                    console.error("Fehler beim Laden des Sortiments", e);
                    sortimentData = [...defaultSortiment];
                }
            } else {
                sortimentData = [...defaultSortiment];
            }
        }

        function saveSortimentToStorage() {
            localStorage.setItem('lavu_studio_sortiment_v8', JSON.stringify(sortimentData));
        }

        function initDropdown() {
            const select = document.getElementById('sortimentSelect');
            const currentIndex = select.value;
            select.innerHTML = '';
            sortimentData.forEach((item, index) => {
                const opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = `[${item.artNr}] ${item.bez}`;
                select.appendChild(opt);
            });
            if (currentIndex !== "" && currentIndex < sortimentData.length) {
                select.value = currentIndex;
            }
        }

        function handlePresetSelection() {
            const select = document.getElementById('sortimentSelect');
            const index = select.value;
            if (index !== "" && sortimentData[index]) {
                const item = sortimentData[index];
                document.getElementById('inputArtNr').value = item.artNr;
                document.getElementById('inputSuffix').value = item.zusatzMitte;
                document.getElementById('inputBezeichnung').value = item.bez;
            }
            updatePreview();
        }

        // ============================================================
        // SORTIMENT VERWALTUNG (CRUD)
        // ============================================================
        function addCurrentAsNewArticle() {
            const artNr = document.getElementById('inputArtNr').value.trim();
            const suffix = document.getElementById('inputSuffix').value.trim();
            const bez = document.getElementById('inputBezeichnung').value.trim();

            if (!artNr || !bez) {
                alert("Bitte mindestens eine Artikel-Nr. und eine Bezeichnung angeben.");
                return;
            }

            const newItem = { artNr: artNr, bez: bez, zusatzMitte: suffix };
            sortimentData.push(newItem);
            saveSortimentToStorage();
            initDropdown();
            
            // Auf den neu erstellten Artikel setzen
            document.getElementById('sortimentSelect').value = sortimentData.length - 1;
            alert("Artikel erfolgreich als neuen Eintrag ans Sortiment angehängt!");
            updatePreview();
        }

        function updateSelectedArticle() {
            const select = document.getElementById('sortimentSelect');
            const index = select.value;
            
            if (index === "" || !sortimentData[index]) {
                alert("Kein gültiger Artikel zum Überschreiben ausgewählt.");
                return;
            }

            const artNr = document.getElementById('inputArtNr').value.trim();
            const suffix = document.getElementById('inputSuffix').value.trim();
            const bez = document.getElementById('inputBezeichnung').value.trim();

            if (!artNr || !bez) {
                alert("Artikel-Nr. und Bezeichnung dürfen nicht leer sein.");
                return;
            }

            sortimentData[index] = { artNr: artNr, bez: bez, zusatzMitte: suffix };
            saveSortimentToStorage();
            initDropdown();
            alert("Ausgewählter Artikel erfolgreich aktualisiert.");
            updatePreview();
        }

        function deleteSelectedArticle() {
            const select = document.getElementById('sortimentSelect');
            const index = select.value;
            
            if (index === "" || !sortimentData[index]) {
                alert("Kein gültiger Artikel zum Löschen ausgewählt.");
                return;
            }

            if (confirm(`Möchtest du den Artikel [${sortimentData[index].artNr}] "${sortimentData[index].bez}" wirklich löschen?`)) {
                sortimentData.splice(index, 1);
                saveSortimentToStorage();
                initDropdown();
                if(sortimentData.length > 0) {
                    document.getElementById('sortimentSelect').value = 0;
                    handlePresetSelection();
                } else {
                    document.getElementById('inputArtNr').value = "";
                    document.getElementById('inputSuffix').value = "";
                    document.getElementById('inputBezeichnung').value = "";
                    updatePreview();
                }
            }
        }

        // ============================================================
        // MODALS
        // ============================================================
        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        function closeSettings() { document.getElementById('settingsModal').style.display = 'none'; }
        function closeSettingsViaBackdrop(event) {
            if (event.target.id === 'settingsModal') closeSettings();
        }

        function openPreviewModal() { 
            document.getElementById('previewModal').style.display = 'flex'; 
            setTimeout(scaleModalPreview, 50);
        }
        function closePreviewModal() { document.getElementById('previewModal').style.display = 'none'; }
        function closePreviewModalViaBackdrop(event) {
            if (event.target.id === 'previewModal') closePreviewModal();
        }

        function triggerDirectPrint() {
            window.print();
        }

        function scaleModalPreview() {
            const bodyScroll = document.getElementById('modalBodyScroll');
            const pageContainer = document.getElementById('modalPageContainer');
            if (!bodyScroll || !pageContainer || document.getElementById('previewModal').style.display !== 'flex') return;

            const availableWidth = bodyScroll.clientWidth;
            const availableHeight = bodyScroll.clientHeight;

            const targetWidth = 793.7;
            const targetHeight = 1122.5;

            const scaleX = (availableWidth - 30) / targetWidth;
            const scaleY = (availableHeight - 30) / targetHeight;
            
            const finalScale = Math.min(scaleX, scaleY);

            pageContainer.style.transform = `scale(${finalScale})`;
            pageContainer.style.position = 'absolute';
        }

        // ============================================================
        // LOCAL STORAGE - DEFAULTS
        // ============================================================
        function saveDefaults() {
            const defaults = {
                topText: document.getElementById('inputTop').value,
                count: document.getElementById('inputCount').value,
                startPos: document.getElementById('inputStartPos').value,
                sortimentIndex: document.getElementById('sortimentSelect').value,
                artNr: document.getElementById('inputArtNr').value,
                suffix: document.getElementById('inputSuffix').value,
                bezeichnung: document.getElementById('inputBezeichnung').value
            };
            localStorage.setItem('lavu_studio_defaults_v8', JSON.stringify(defaults));

            const btn = document.getElementById('btnSaveDefaults');
            btn.innerHTML = '✓ Gespeichert!';
            btn.style.backgroundColor = '#27ae60';
            setTimeout(() => {
                btn.innerHTML =
                    '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Standard sichern';
                btn.style.backgroundColor = '#3498db';
            }, 1800);
        }

        function loadDefaults() {
            const saved = localStorage.getItem('lavu_studio_defaults_v8');
            if (saved) {
                try {
                    const defaults = JSON.parse(saved);
                    if (defaults.topText !== undefined) document.getElementById('inputTop').value = defaults.topText;
                    if (defaults.count !== undefined) document.getElementById('inputCount').value = Math.min(21, defaults.count);
                    if (defaults.startPos !== undefined) document.getElementById('inputStartPos').value = Math.min(21, defaults.startPos);
                    if (defaults.artNr !== undefined) document.getElementById('inputArtNr').value = defaults.artNr;
                    if (defaults.suffix !== undefined) document.getElementById('inputSuffix').value = defaults.suffix;
                    if (defaults.bezeichnung !== undefined) document.getElementById('inputBezeichnung').value = defaults.bezeichnung;
                    if (defaults.sortimentIndex !== undefined && defaults.sortimentIndex < sortimentData.length) {
                        document.getElementById('sortimentSelect').value = defaults.sortimentIndex;
                    }
                    updatePreview();
                } catch (e) {
                    console.error("Fehler beim Laden", e);
                    handlePresetSelection();
                }
            } else {
                handlePresetSelection();
            }
        }

        // ============================================================
        // RENDER – 21 Etiketten (3 × 7)
        // ============================================================
        function updatePreview() {
            const thumbnailSheet = document.getElementById('thumbnailSheet');
            const labelSheetModal = document.getElementById('labelSheetModal');
            const labelSheetDirect = document.getElementById('labelSheetDirect');

            if(!thumbnailSheet || !labelSheetModal || !labelSheetDirect) return;

            thumbnailSheet.innerHTML = '';
            labelSheetModal.innerHTML = '';
            labelSheetDirect.innerHTML = '';

            const topText = document.getElementById('inputTop').value;
            const artNr = document.getElementById('inputArtNr').value;
            const suffix = document.getElementById('inputSuffix').value;
            const bezeichnung = document.getElementById('inputBezeichnung').value;

            document.getElementById('headerStationText').innerHTML = topText;
            document.getElementById('sumBezeichnung').innerHTML = bezeichnung;
            document.getElementById('sumArtNr').innerHTML = artNr;
            document.getElementById('sumSuffix').innerHTML = suffix;

            const count = Math.max(1, Math.min(21, parseInt(document.getElementById('inputCount').value) || 1));
            const startPos = Math.max(1, Math.min(21, parseInt(document.getElementById('inputStartPos').value) || 1));

            document.getElementById('sumMenge').innerHTML = `${count}x (ab Position ${startPos})`;

            let HTMLContent = '';

            for (let i = 1; i < startPos; i++) {
                HTMLContent += `<div class="label empty"></div>`;
            }

            for (let i = 0; i < count; i++) {
                if ((startPos - 1 + i) >= 21) break;
                HTMLContent += `
                    <div class="label">
                        <div class="label-top">${topText}</div>
                        <div class="label-middle">
                            <span class="num">${artNr}</span>
                            <span class="sep">·</span>
                            <span class="suffix">${suffix}</span>
                        </div>
                        <div class="label-bottom" title="${bezeichnung}">${bezeichnung}</div>
                    </div>
                `;
            }

            let currentCells = startPos - 1 + count;
            while (currentCells < 21) {
                HTMLContent += `<div class="label empty"></div>`;
                currentCells++;
            }

            thumbnailSheet.innerHTML = HTMLContent;
            labelSheetModal.innerHTML = HTMLContent;
            labelSheetDirect.innerHTML = HTMLContent;
            
            scaleModalPreview();
        }
    </script>
<script>
    let deferredPrompt;

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker erfolgreich registriert!', reg))
                .catch(err => console.error('Service Worker Registrierung fehlgeschlagen:', err));
        });
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const banner = document.getElementById('pwaBanner');
        if (banner) banner.style.display = 'flex';
    });

    const installBtn = document.getElementById('btnPwaInstall');
    if (installBtn) {
        installBtn.addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('User hat die Installation akzeptiert.');
                    }
                    const banner = document.getElementById('pwaBanner');
                    if (banner) banner.style.display = 'none';
                    deferredPrompt = null;
                });
            }
        });
    }
    window.addEventListener('appinstalled', () => {
        console.log('LAVU v8 App wurde erfolgreich installiert.');
        const banner = document.getElementById('pwaBanner');
        if (banner) banner.style.display = 'none';
    });
</script>
</body>
</html>
