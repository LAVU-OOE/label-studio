<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ASZ Transport-Etiketten</title>
    <style>
        @page {
            size: A4 landscape; /* Querformat für maximale Schriftgröße */
            margin: 10mm;
        }
        body {
            font-family: 'Arial Black', Impact, sans-serif; /* Sehr dicke, gut lesbare Schrift */
            margin: 0;
            padding: 0;
            background-color: #ffffff;
        }
        .container {
            width: 100%;
            max-width: 1100px;
            margin: 0 auto;
        }
        .label {
            width: 100%;
            height: 180mm; /* Füllt fast die ganze A4-Seite */
            border: 5px solid #000000;
            box-sizing: border-box;
            padding: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            page-break-after: always; /* Jedes Etikett auf einer neuen Seite */
        }
        .line-1 {
            font-size: 80pt; /* Riesige Schrift für den Ort */
            line-height: 1.1;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .line-2 {
            font-size: 55pt; /* Etwas kleiner für die Artikelnummer + Bezeichnung */
            line-height: 1.2;
            color: #000000;
            border-top: 8px solid #000;
            padding-top: 40px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="label">
            <div class="line-1">106 Asten</div>
            <div class="line-2">4040 Elektro Kleingeräte</div>
        </div>

        <div class="label">
            <div class="line-1">106 Asten</div>
            <div class="line-2">4010 Elektro Großgeräte</div>
        </div>

    </div>

</body>
</html>
