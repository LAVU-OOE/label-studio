<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ASZ Asten · Terminal & Office</title>
    <!-- Bootstrap 5 -->
    <link id="bootstrapCss" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Material Icons & Roboto Font -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ----- Theme Variables ----- */
        :root {
            --bg-primary: #0f212e;
            --bg-secondary: #162a38;
            --bg-card: #0f212e;
            --bg-input: rgba(255,255,255,0.06);
            --bg-item: rgba(255,255,255,0.04);
            --bg-item-hover: rgba(255,255,255,0.08);
            --text-primary: #e0edf5;
            --text-secondary: #8bc1e0;
            --text-muted: #6a8a9a;
            --border-color: #1f3a4a;
            --border-light: #2a5a6a;
            --shadow-color: rgba(0,0,0,0.5);
            --card-border: #2a5a6a;
            --card-active-border: #4a9abf;
            --btn-bg: rgba(31,93,122,0.2);
            --btn-hover: rgba(31,93,122,0.4);
            --btn-text: #8ac0da;
            --badge-bg: rgba(31,93,122,0.25);
            --badge-text: #8ac0da;
            --dot-color: #2ecc71;
            --dot-offline: #e74c3c;
            --scrollbar-color: #1f3a4a;
            --count-color: #7ac0e0;
            --font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            --header-height: 50px;
            --footer-height: 40px;
        }
        [data-bs-theme="light"] {
            --bg-primary: #e8edf2;
            --bg-secondary: #d5dee8;
            --bg-card: #ffffff;
            --bg-input: rgba(0,0,0,0.04);
            --bg-item: rgba(0,0,0,0.02);
            --bg-item-hover: rgba(0,0,0,0.06);
            --text-primary: #1a2f3e;
            --text-secondary: #0f212e;
            --text-muted: #5a7a8a;
            --border-color: #b8c9da;
            --border-light: #a0b8c8;
            --shadow-color: rgba(0,0,0,0.12);
            --card-border: #b8c9da;
            --card-active-border: #1f5d7a;
            --btn-bg: rgba(31,93,122,0.08);
            --btn-hover: rgba(31,93,122,0.16);
            --btn-text: #1f5d7a;
            --badge-bg: rgba(31,93,122,0.08);
            --badge-text: #1f5d7a;
            --dot-color: #27ae60;
            --dot-offline: #e74c3c;
            --scrollbar-color: #b8c9da;
            --count-color: #1f5d7a;
        }

        /* ----- Material Design ----- */
        .material-design {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --bg-input: rgba(0,0,0,0.04);
            --bg-item: rgba(0,0,0,0.02);
            --bg-item-hover: rgba(0,0,0,0.06);
            --text-primary: #1a1a1a;
            --text-secondary: #1f5d7a;
            --text-muted: #757575;
            --border-color: #e0e0e0;
            --border-light: #bdbdbd;
            --shadow-color: rgba(0,0,0,0.1);
            --card-border: #e0e0e0;
            --card-active-border: #1f5d7a;
            --btn-bg: rgba(31,93,122,0.08);
            --btn-hover: rgba(31,93,122,0.16);
            --btn-text: #1f5d7a;
            --badge-bg: rgba(31,93,122,0.08);
            --badge-text: #1f5d7a;
            --dot-color: #4caf50;
            --dot-offline: #e74c3c;
            --scrollbar-color: #bdbdbd;
            --count-color: #1f5d7a;
            --font-family: 'Roboto', 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .material-design [data-bs-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
        }
        .material-design.dark-theme {
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --bg-card: #1e1e1e;
            --bg-input: rgba(255,255,255,0.06);
            --bg-item: rgba(255,255,255,0.04);
            --bg-item-hover: rgba(255,255,255,0.08);
            --text-primary: #e0e0e0;
            --text-secondary: #90caf9;
            --text-muted: #9e9e9e;
            --border-color: #333333;
            --border-light: #444444;
            --shadow-color: rgba(0,0,0,0.4);
            --card-border: #333333;
            --card-active-border: #90caf9;
            --btn-bg: rgba(144,202,249,0.12);
            --btn-hover: rgba(144,202,249,0.24);
            --btn-text: #90caf9;
            --badge-bg: rgba(144,202,249,0.12);
            --badge-text: #90caf9;
            --dot-color: #4caf50;
            --dot-offline: #e74c3c;
            --scrollbar-color: #444444;
            --count-color: #90caf9;
        }

        /* ----- Reset & Base ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-family);
        }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            background: var(--bg-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px;
            min-height: 100vh;
            min-height: 100dvh;
            transition: background 0.3s ease;
        }

        .material-icons {
            font-family: 'Material Icons';
            font-weight: normal;
            font-style: normal;
            font-size: 22px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }

        /* ----- Main Container ----- */
        .app-container {
            max-width: 1600px;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            max-height: 1000px;
            background: var(--bg-primary);
            border-radius: 24px;
            box-shadow: 0 25px 50px var(--shadow-color), inset 0 1px 0 rgba(255,255,255,0.05);
            padding: clamp(10px, 1.5vw, 20px);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        /* ----- Header - Kompakt ----- */
        .app-header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 6px 12px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: clamp(6px, 0.8vh, 10px);
            margin-bottom: clamp(8px, 1vh, 12px);
            flex-shrink: 0;
            transition: border-color 0.3s ease;
            min-height: 40px;
        }
        .app-title {
            display: flex;
            align-items: center;
            gap: clamp(6px, 1vw, 14px);
            flex-wrap: wrap;
        }
        .app-title h1 {
            font-weight: 700;
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            letter-spacing: -0.3px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            font-family: var(--font-family);
        }
        .app-title h1 i {
            color: #3a8aaf;
            font-size: clamp(0.9rem, 1.4vw, 1.2rem);
        }
        .app-title .badge {
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 2px clamp(8px, 1vw, 14px);
            border-radius: 40px;
            font-size: clamp(0.55rem, 0.8vw, 0.75rem);
            font-weight: 600;
            border: 1px solid var(--border-light);
            white-space: nowrap;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }
        .app-title .title-icons {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: clamp(0.7rem, 0.9vw, 0.9rem);
        }
        .app-title .title-icons i {
            color: var(--text-muted);
        }

        .app-status {
            display: flex;
            align-items: center;
            gap: clamp(6px, 1vw, 14px);
            flex-wrap: wrap;
        }
        .sync-status {
            display: flex;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: clamp(0.55rem, 0.7vw, 0.7rem);
            font-weight: 500;
        }
        .sync-status .dot {
            width: clamp(8px, 0.8vw, 10px);
            height: clamp(8px, 0.8vw, 10px);
            border-radius: 50%;
            background: var(--dot-color);
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.3);
            animation: pulse 2s infinite;
            flex-shrink: 0;
            transition: background 0.3s ease;
        }
        .sync-status .dot.offline {
            background: var(--dot-offline);
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.3);
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .theme-toggle {
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: clamp(2px, 0.3vh, 4px) clamp(6px, 0.6vw, 10px);
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            font-size: clamp(0.6rem, 0.7vw, 0.75rem);
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 4px;
            font-family: var(--font-family);
        }
        .theme-toggle:hover {
            background: var(--btn-hover);
        }

        .view-toggle {
            display: flex;
            gap: 3px;
            background: var(--bg-input);
            border-radius: 30px;
            padding: 3px;
            border: 1px solid var(--border-color);
        }
        .view-toggle button {
            background: transparent;
            border: none;
            padding: clamp(3px, 0.4vh, 6px) clamp(8px, 0.8vw, 14px);
            border-radius: 20px;
            font-weight: 600;
            font-size: clamp(0.55rem, 0.7vw, 0.75rem);
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            white-space: nowrap;
            font-family: var(--font-family);
        }
        .view-toggle button.active {
            background: #1f5d7a;
            color: white;
            box-shadow: 0 0 15px rgba(31, 93, 122, 0.25);
        }
        .view-toggle button:hover:not(.active) {
            background: var(--bg-item-hover);
        }

        /* ----- Main Grid - 3 Spalten Layout ----- */
        .app-grid {
            display: flex;
            flex-direction: row;
            gap: clamp(10px, 1.5vw, 18px);
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ----- Linke Spalte: Materialauswahl (kompakt) ----- */
        .terminal-panel {
            flex: 1.2;
            min-width: 0;
            background: var(--bg-secondary);
            border-radius: clamp(12px, 1.5vw, 16px);
            padding: clamp(8px, 1vw, 14px);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .terminal-panel.hidden {
            display: none;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: clamp(4px, 0.5vw, 8px);
            margin-bottom: clamp(6px, 0.6vh, 10px);
            background: var(--bg-input);
            padding: clamp(4px, 0.4vw, 8px) clamp(8px, 0.8vw, 12px);
            border-radius: 40px;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .filter-bar input {
            flex: 2;
            min-width: 80px;
            border: none;
            background: var(--bg-input);
            padding: clamp(4px, 0.5vh, 8px) clamp(8px, 0.8vw, 12px);
            border-radius: 30px;
            font-size: clamp(0.7rem, 0.8vw, 0.85rem);
            color: var(--text-primary);
            border: 1px solid var(--border-light);
            transition: 0.15s;
            touch-action: manipulation;
            font-family: var(--font-family);
        }
        .filter-bar input:focus {
            outline: none;
            border-color: #3a8aaf;
            background: var(--bg-item-hover);
            box-shadow: 0 0 0 2px rgba(31, 93, 122, 0.15);
        }
        .filter-bar input::placeholder {
            color: var(--text-muted);
            font-size: clamp(0.6rem, 0.7vw, 0.75rem);
        }
        .block-selector {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: clamp(2px, 0.3vw, 6px);
        }
        .block-selector span {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: clamp(0.55rem, 0.6vw, 0.7rem);
            font-family: var(--font-family);
        }
        .block-btn {
            background: transparent;
            border: 1px solid var(--border-light);
            padding: clamp(2px, 0.3vh, 4px) clamp(6px, 0.6vw, 10px);
            border-radius: 30px;
            font-weight: 600;
            font-size: clamp(0.5rem, 0.55vw, 0.65rem);
            cursor: pointer;
            transition: 0.15s;
            color: var(--text-muted);
            touch-action: manipulation;
            white-space: nowrap;
            font-family: var(--font-family);
        }
        .block-btn.active {
            background: #1f5d7a;
            border-color: #3a8aaf;
            color: white;
            box-shadow: 0 0 10px rgba(31, 93, 122, 0.2);
        }
        .block-btn:hover:not(.active) {
            background: var(--bg-item-hover);
        }
        .block-btn:active {
            transform: scale(0.95);
        }

        .material-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 3px;
            margin-top: 2px;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
        }
        .material-list::-webkit-scrollbar {
            width: 3px;
        }
        .material-list::-webkit-scrollbar-thumb {
            background: var(--scrollbar-color);
            border-radius: 6px;
        }
        .material-list {
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-color) transparent;
        }

        .material-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: clamp(4px, 0.5vw, 8px);
            padding: clamp(4px, 0.5vh, 8px) clamp(6px, 0.6vw, 10px);
            margin-bottom: clamp(2px, 0.2vh, 4px);
            background: var(--bg-item);
            border-radius: 40px;
            border: 1px solid var(--border-color);
            transition: 0.15s;
            cursor: default;
            flex-wrap: wrap;
        }
        .material-item:hover {
            background: var(--bg-item-hover);
            border-color: var(--border-light);
        }
        .material-item .code {
            font-weight: 700;
            color: #7ac0e0;
            font-size: clamp(0.7rem, 0.8vw, 0.85rem);
            flex-shrink: 0;
            min-width: 36px;
        }
        .material-item .desc {
            flex: 1;
            margin: 0 clamp(3px, 0.4vw, 6px);
            font-weight: 500;
            color: var(--text-primary);
            font-size: clamp(0.6rem, 0.7vw, 0.75rem);
            min-width: 50px;
            line-height: 1.2;
        }
        .material-item .container-badge {
            background: var(--badge-bg);
            padding: 1px clamp(4px, 0.4vw, 8px);
            border-radius: 30px;
            font-size: clamp(0.45rem, 0.5vw, 0.55rem);
            font-weight: 600;
            color: var(--badge-text);
            border: 1px solid var(--border-light);
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .material-item .item-controls {
            display: flex;
            align-items: center;
            gap: clamp(2px, 0.3vw, 6px);
            flex-shrink: 0;
        }
        .material-item .qty-btn {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            width: clamp(22px, 2vw, 30px);
            height: clamp(22px, 2vw, 30px);
            font-weight: 700;
            color: var(--btn-text);
            cursor: pointer;
            transition: 0.15s;
            font-size: clamp(0.65rem, 0.7vw, 0.8rem);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            flex-shrink: 0;
            font-family: var(--font-family);
        }
        .material-item .qty-btn:hover:not(:disabled) {
            background: var(--btn-hover);
            border-color: #3a8aaf;
            color: white;
        }
        .material-item .qty-btn:active:not(:disabled) {
            transform: scale(0.9);
        }
        .material-item .qty-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }
        .material-item .qty-btn.minus-btn {
            color: #cc8888;
        }
        .material-item .qty-btn.minus-btn:hover:not(:disabled) {
            background: rgba(200, 80, 80, 0.15);
            border-color: #aa5555;
            color: #ff8888;
        }
        .material-item .item-count {
            font-weight: 700;
            color: var(--count-color);
            font-size: clamp(0.7rem, 0.8vw, 0.85rem);
            min-width: 16px;
            text-align: center;
            transition: color 0.3s ease;
        }
        .material-item .item-count.zero {
            color: var(--text-muted);
        }

        /* ----- Mittlere Spalte: Karteikärtchen (groß) ----- */
        .card-panel {
            flex: 1.6;
            min-width: 0;
            background: var(--bg-secondary);
            border-radius: clamp(12px, 1.5vw, 16px);
            padding: clamp(10px, 1.2vw, 16px);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .card-panel.hidden {
            display: none;
        }

        .card-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: clamp(4px, 0.5vh, 8px);
            margin-bottom: clamp(6px, 0.6vh, 10px);
            flex-shrink: 0;
        }
        .card-panel-header h4 {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: clamp(0.8rem, 1vw, 1rem);
            display: flex;
            align-items: center;
            gap: 6px;
            margin: 0;
            font-family: var(--font-family);
        }
        .card-panel-header h4 i {
            font-size: clamp(0.7rem, 0.9vw, 0.9rem);
        }
        .card-panel-header .print-actions {
            display: flex;
            gap: clamp(4px, 0.4vw, 8px);
        }
        .card-panel-header .print-actions button {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: clamp(2px, 0.2vh, 4px) clamp(6px, 0.5vw, 10px);
            font-weight: 600;
            font-size: clamp(0.5rem, 0.5vw, 0.65rem);
            color: var(--btn-text);
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
            white-space: nowrap;
            font-family: var(--font-family);
            display: inline-flex;
            align-items: center;
            gap: 3px;
        }
        .card-panel-header .print-actions button:hover:not(:disabled) {
            background: var(--btn-hover);
            border-color: #3a8aaf;
            color: white;
        }
        .card-panel-header .print-actions button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .card-panel-header .print-actions button i {
            font-size: clamp(0.5rem, 0.5vw, 0.65rem);
        }
        .card-panel-header .card-count {
            color: var(--text-muted);
            font-size: clamp(0.65rem, 0.7vw, 0.8rem);
        }

        .card-stack-container {
            position: relative;
            flex: 1;
            min-height: 120px;
            perspective: 1200px;
            touch-action: pan-y;
            cursor: grab;
        }
        .card-stack-container:active {
            cursor: grabbing;
        }
        .card-stack {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .card-item {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-card);
            border: 2.5px solid var(--card-border);
            border-radius: clamp(14px, 2vw, 20px);
            padding: clamp(16px, 2.5vw, 30px) clamp(18px, 3vw, 36px);
            font-family: 'Courier New', monospace;
            font-size: clamp(0.85rem, 1.2vw, 1.1rem);
            line-height: 2;
            color: var(--text-primary);
            text-align: right;
            transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.4s ease, box-shadow 0.3s ease, border-color 0.3s ease, background 0.3s ease;
            backface-visibility: hidden;
            box-shadow: 0 4px 16px var(--shadow-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
            will-change: transform;
            touch-action: none;
        }
        .card-item.active {
            transform: translateX(0) scale(1) rotate(0deg);
            opacity: 1;
            z-index: 10;
            box-shadow: 0 12px 48px var(--shadow-color), 0 0 40px rgba(31, 93, 122, 0.12);
            border-color: var(--card-active-border);
        }
        .card-item.prev {
            transform: translateX(clamp(-40px, -6vw, -70px)) scale(0.88) rotate(-3deg);
            opacity: 0.25;
            z-index: 5;
            filter: blur(0.5px);
        }
        .card-item.next {
            transform: translateX(clamp(40px, 6vw, 70px)) scale(0.88) rotate(3deg);
            opacity: 0.25;
            z-index: 5;
            filter: blur(0.5px);
        }
        .card-item.hidden {
            transform: translateX(clamp(60px, 10vw, 120px)) scale(0.8) rotate(5deg);
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }
        .card-item .card-site {
            font-weight: 700;
            font-size: clamp(0.9rem, 1.3vw, 1.2rem);
            color: var(--text-secondary);
            margin-bottom: 2px;
        }
        .card-item .card-code {
            font-weight: 700;
            color: #7ac0e0;
            font-size: clamp(1.2rem, 1.8vw, 1.6rem);
        }
        .card-item .card-container {
            font-weight: 600;
            color: var(--badge-text);
            font-size: clamp(0.8rem, 1vw, 1rem);
        }
        .card-item .card-desc {
            font-size: clamp(0.8rem, 1.1vw, 1rem);
        }
        .card-item .card-index {
            position: absolute;
            top: clamp(10px, 1.2vh, 16px);
            left: clamp(14px, 1.8vw, 24px);
            font-size: clamp(0.55rem, 0.6vw, 0.7rem);
            color: var(--text-muted);
            font-weight: 600;
            background: rgba(0,0,0,0.2);
            padding: 1px clamp(8px, 0.8vw, 14px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }
        .card-item .card-select-hint {
            position: absolute;
            bottom: clamp(10px, 1.2vh, 16px);
            left: 50%;
            transform: translateX(-50%);
            font-size: clamp(0.45rem, 0.5vw, 0.55rem);
            color: var(--text-muted);
            opacity: 0.4;
            background: rgba(0,0,0,0.2);
            padding: 1px clamp(10px, 1vw, 16px);
            border-radius: 20px;
            white-space: nowrap;
            pointer-events: none;
            border: 1px solid var(--border-color);
        }

        .card-dots {
            display: flex;
            justify-content: center;
            gap: clamp(5px, 0.6vw, 8px);
            margin-top: clamp(4px, 0.4vh, 8px);
            padding: 2px 0;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .card-dot {
            width: clamp(8px, 0.8vw, 11px);
            height: clamp(8px, 0.8vw, 11px);
            border-radius: 50%;
            background: var(--border-color);
            border: 1px solid var(--border-light);
            padding: 0;
            cursor: pointer;
            transition: all 0.25s ease;
            flex-shrink: 0;
            touch-action: manipulation;
        }
        .card-dot.active {
            background: #1f5d7a;
            border-color: #3a8aaf;
            transform: scale(1.35);
            box-shadow: 0 0 16px rgba(31, 93, 122, 0.35);
        }
        .card-dot:active {
            transform: scale(0.85);
        }

        .card-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(10px, 1.2vw, 18px);
            margin-top: clamp(4px, 0.4vh, 8px);
            padding: 2px 0;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .card-nav button {
            background: var(--btn-bg);
            border: 1px solid var(--border-light);
            border-radius: 30px;
            padding: clamp(4px, 0.5vh, 8px) clamp(10px, 1vw, 16px);
            font-weight: 700;
            color: var(--btn-text);
            cursor: pointer;
            transition: 0.15s;
            font-size: clamp(0.6rem, 0.7vw, 0.8rem);
            display: inline-flex;
            align-items: center;
            gap: clamp(3px, 0.4vw, 6px);
            touch-action: manipulation;
            white-space: nowrap;
            font-family: var(--font-family);
        }
        .card-nav button:hover:not(:disabled) {
            background: var(--btn-hover);
            border-color: #3a8aaf;
            color: white;
        }
        .card-nav button:active:not(:disabled) {
            transform: scale(0.95);
        }
        .card-nav button:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }
        .card-nav .counter {
            font-weight: 700;
            color: var(--text-secondary);
            font-size: clamp(0.8rem, 0.9vw, 1rem);
            min-width: clamp(45px, 5vw, 65px);
            text-align: center;
            background: rgba(0,0,0,0.15);
            padding: clamp(2px, 0.3vh, 4px) clamp(8px, 0.8vw, 14px);
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .card-empty {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 20px 10px;
            background: var(--bg-item);
            border-radius: 16px;
            border: 2px dashed var(--border-color);
            font-family: 'Courier New', monospace;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(0.8rem, 0.9vw, 0.95rem);
        }

        /* ----- Rechte Spalte: Frachtliste (kompakt) ----- */
        .office-panel {
            flex: 0.9;
            min-width: 0;
            background: var(--bg-secondary);
            border-radius: clamp(12px, 1.5vw, 16px);
            padding: clamp(8px, 1vw, 14px);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .office-panel.hidden {
            display: none;
        }

        .office-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: clamp(4px, 0.5vh, 8px);
            margin-bottom: clamp(6px, 0.6vh, 10px);
            flex-shrink: 0;
        }
        .office-header h3 {
            font-weight: 600;
            color: var(--text-secondary);
            font-size: clamp(0.75rem, 0.9vw, 0.95rem);
            display: flex;
            align-items: center;
            gap: 5px;
            margin: 0;
            font-family: var(--font-family);
        }
        .office-header h3 i {
            font-size: clamp(0.7rem, 0.8vw, 0.85rem);
        }
        .office-header .count-badge {
            background: #1f5d7a;
            color: white;
            border-radius: 30px;
            padding: 0 clamp(8px, 0.8vw, 14px);
            font-weight: 700;
            font-size: clamp(0.7rem, 0.8vw, 0.85rem);
            line-height: clamp(22px, 2.5vh, 28px);
            border: 1px solid #3a8aaf;
            flex-shrink: 0;
        }

        .office-list {
            flex: 1;
            overflow-y: auto;
            padding-right: 3px;
            -webkit-overflow-scrolling: touch;
        }
        .office-list::-webkit-scrollbar {
            width: 3px;
        }
        .office-list::-webkit-scrollbar-thumb {
            background: var(--scrollbar-color);
            border-radius: 6px;
        }
        .office-list {
            scrollbar-width: thin;
            scrollbar-color: var(--scrollbar-color) transparent;
        }

        .office-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: clamp(3px, 0.4vw, 6px);
            padding: clamp(3px, 0.3vh, 6px) clamp(4px, 0.4vw, 8px);
            background: var(--bg-item);
            border-radius: 30px;
            margin-bottom: clamp(2px, 0.2vh, 4px);
            border: 1px solid var(--border-color);
            transition: background 0.3s ease, border-color 0.3s ease;
        }
        .office-item:hover {
            background: var(--bg-item-hover);
        }
        .office-item .o-code {
            font-weight: 700;
            color: #7ac0e0;
            flex-shrink: 0;
            min-width: 34px;
            font-size: clamp(0.65rem, 0.7vw, 0.8rem);
        }
        .office-item .o-desc {
            flex: 1;
            margin: 0 clamp(2px, 0.3vw, 6px);
            font-weight: 500;
            color: var(--text-primary);
            font-size: clamp(0.55rem, 0.6vw, 0.7rem);
            min-width: 30px;
            line-height: 1.2;
        }
        .office-item .o-container {
            background: var(--badge-bg);
            padding: 1px clamp(4px, 0.4vw, 8px);
            border-radius: 20px;
            font-size: clamp(0.45rem, 0.45vw, 0.55rem);
            font-weight: 600;
            color: var(--badge-text);
            border: 1px solid var(--border-light);
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.3s ease, color 0.3s ease;
        }
        .office-item .o-time {
            font-size: clamp(0.4rem, 0.4vw, 0.5rem);
            color: var(--text-muted);
            flex-shrink: 0;
            min-width: 40px;
            text-align: right;
        }
        .office-item .o-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: clamp(0.7rem, 0.7vw, 0.85rem);
            padding: 0 clamp(2px, 0.2vw, 4px);
            transition: 0.15s;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .office-item .o-delete:hover {
            color: #e06666;
        }
        .office-item .o-delete:active {
            transform: scale(0.85);
        }

        .office-empty {
            text-align: center;
            color: var(--text-muted);
            font-style: italic;
            padding: 20px 6px;
            font-size: clamp(0.7rem, 0.7vw, 0.8rem);
        }

        .office-footer {
            margin-top: auto;
            padding-top: clamp(6px, 0.6vh, 10px);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
            flex-wrap: wrap;
        }
        .office-footer button {
            background: transparent;
            border: 1px solid #aa5555;
            border-radius: 30px;
            padding: clamp(2px, 0.2vh, 4px) clamp(8px, 0.6vw, 12px);
            color: #cc8888;
            cursor: pointer;
            font-weight: 600;
            font-size: clamp(0.5rem, 0.5vw, 0.65rem);
            touch-action: manipulation;
            font-family: var(--font-family);
            white-space: nowrap;
        }
        .office-footer button:hover {
            background: rgba(200, 80, 80, 0.12);
        }
        .office-footer span {
            color: var(--text-muted);
            font-size: clamp(0.45rem, 0.45vw, 0.55rem);
        }

        /* ----- Terminal Actions (kompakt) ----- */
        .terminal-actions {
            display: flex;
            gap: clamp(4px, 0.4vw, 8px);
            justify-content: flex-end;
            margin-top: clamp(4px, 0.4vh, 8px);
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .terminal-actions button {
            background: transparent;
            border: 1px solid var(--border-light);
            padding: clamp(2px, 0.2vh, 4px) clamp(8px, 0.6vw, 14px);
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            color: var(--text-muted);
            font-size: clamp(0.5rem, 0.5vw, 0.65rem);
            touch-action: manipulation;
            white-space: nowrap;
            font-family: var(--font-family);
        }
        .terminal-actions button:active {
            transform: scale(0.95);
        }
        .terminal-actions .clear-btn {
            color: #cc8888;
        }
        .terminal-actions .clear-btn:hover {
            background: rgba(200, 80, 80, 0.12);
            border-color: #aa5555;
        }
        .terminal-actions .sample-btn {
            border-color: #2a6a7a;
            background: rgba(31, 93, 122, 0.12);
            color: var(--btn-text);
        }
        .terminal-actions .sample-btn:hover {
            background: var(--btn-hover);
        }
        .terminal-actions .sync-btn {
            border-color: #2ecc71;
            color: #5cdb9a;
            background: rgba(46, 204, 113, 0.06);
        }
        .terminal-actions .sync-btn:hover {
            background: rgba(46, 204, 113, 0.15);
        }

        /* ----- Footer (kompakt) ----- */
        .app-footer {
            margin-top: clamp(6px, 0.6vh, 10px);
            font-size: clamp(0.5rem, 0.5vw, 0.6rem);
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: clamp(4px, 0.4vh, 8px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 4px;
            transition: border-color 0.3s ease, color 0.3s ease;
            min-height: 28px;
        }
        .app-footer .footer-left {
            display: flex;
            align-items: center;
            gap: clamp(4px, 0.4vw, 8px);
            color: var(--text-muted);
        }
        .app-footer .footer-left i {
            color: var(--dot-color);
            font-size: clamp(0.4rem, 0.4vw, 0.5rem);
            transition: color 0.3s ease;
        }
        .app-footer .footer-left i.offline {
            color: var(--dot-offline);
        }
        .app-footer .footer-right {
            display: flex;
            align-items: center;
            gap: clamp(4px, 0.4vw, 8px);
        }
        .app-footer .footer-right .design-toggle {
            display: flex;
            gap: 2px;
            background: var(--bg-input);
            border-radius: 20px;
            padding: 2px;
            border: 1px solid var(--border-color);
        }
        .app-footer .footer-right .design-toggle button {
            background: transparent;
            border: none;
            padding: clamp(1px, 0.2vh, 2px) clamp(4px, 0.4vw, 8px);
            border-radius: 16px;
            font-weight: 500;
            font-size: clamp(0.45rem, 0.4vw, 0.55rem);
            color: var(--text-muted);
            cursor: pointer;
            transition: 0.2s;
            touch-action: manipulation;
            white-space: nowrap;
            font-family: var(--font-family);
        }
        .app-footer .footer-right .design-toggle button.active {
            background: #1f5d7a;
            color: white;
            box-shadow: 0 0 8px rgba(31, 93, 122, 0.15);
        }
        .app-footer .footer-right .design-toggle button:hover:not(.active) {
            background: var(--bg-item-hover);
        }
        .app-footer .footer-right .theme-toggle-sm {
            background: var(--bg-input);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: clamp(1px, 0.2vh, 2px) clamp(4px, 0.4vw, 8px);
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.2s;
            font-size: clamp(0.5rem, 0.5vw, 0.6rem);
            touch-action: manipulation;
            display: flex;
            align-items: center;
            gap: 3px;
            font-family: var(--font-family);
        }
        .app-footer .footer-right .theme-toggle-sm:hover {
            background: var(--btn-hover);
        }
        .app-footer .device-info {
            color: var(--text-muted);
            font-size: clamp(0.4rem, 0.4vw, 0.5rem);
        }

        /* ----- EC-Card Größe für Druck ----- */
        @media print {
            /* ... print styles ... */
        }

        /* ----- Responsive ----- */
        @media (max-width: 1024px) {
            .app-grid {
                gap: 8px;
            }
            .terminal-panel { flex: 1; }
            .card-panel { flex: 1.4; }
            .office-panel { flex: 0.8; }
        }
        @media (max-width: 768px) {
            .app-grid {
                flex-direction: column;
                gap: 6px;
            }
            .terminal-panel {
                flex: 0 0 auto;
                max-height: 35vh;
                min-height: 120px;
            }
            .card-panel {
                flex: 1;
                min-height: 120px;
            }
            .office-panel {
                flex: 0 0 auto;
                max-height: 30vh;
                min-height: 80px;
            }
            .app-container {
                height: 100vh;
                height: 100dvh;
                max-height: none;
                border-radius: 16px;
                padding: 8px;
            }
            .view-toggle button {
                padding: 2px 8px;
                font-size: 0.6rem;
            }
            .card-panel-header .print-actions button {
                font-size: 0.5rem;
                padding: 1px 5px;
            }
            .material-item .desc {
                font-size: 0.7rem;
            }
            .office-item .o-desc {
                font-size: 0.6rem;
            }
        }
        @media (max-width: 480px) {
            body { padding: 4px; }
            .app-container {
                border-radius: 12px;
                padding: 6px;
                height: 100vh;
                height: 100dvh;
            }
            .app-title h1 { font-size: 0.95rem; }
            .app-title .badge { font-size: 0.5rem; padding: 1px 6px; }
            .view-toggle button { font-size: 0.5rem; padding: 2px 6px; }
            .sync-status { font-size: 0.5rem; }
            .sync-status .dot { width: 6px; height: 6px; }
            .terminal-panel { max-height: 30vh; padding: 6px; }
            .card-panel { padding: 6px; min-height: 100px; }
            .office-panel { max-height: 25vh; padding: 6px; }
            .card-item { padding: 10px 12px; font-size: 0.65rem; }
            .card-item .card-site { font-size: 0.7rem; }
            .card-item .card-code { font-size: 0.85rem; }
            .material-item { padding: 3px 6px; }
            .material-item .desc { font-size: 0.6rem; }
            .material-item .qty-btn { width: 18px; height: 18px; font-size: 0.6rem; }
            .filter-bar input { font-size: 0.6rem; padding: 3px 6px; }
            .block-btn { font-size: 0.45rem; padding: 2px 5px; }
            .office-item { padding: 2px 4px; }
            .office-item .o-code { font-size: 0.55rem; min-width: 28px; }
            .office-item .o-desc { font-size: 0.5rem; }
            .office-item .o-container { font-size: 0.4rem; padding: 1px 4px; }
            .office-item .o-time { font-size: 0.35rem; min-width: 30px; }
            .card-nav button { font-size: 0.55rem; padding: 3px 8px; }
            .card-nav .counter { font-size: 0.65rem; min-width: 35px; padding: 1px 6px; }
            .card-dot { width: 6px; height: 6px; }
            .terminal-actions button { font-size: 0.45rem; padding: 1px 6px; }
            .office-footer button { font-size: 0.45rem; padding: 1px 6px; }
            .office-footer span { font-size: 0.4rem; }
            .app-footer { font-size: 0.4rem; min-height: 20px; padding-top: 3px; }
            .app-footer .footer-right .design-toggle button { font-size: 0.4rem; padding: 1px 4px; }
            .app-footer .footer-right .theme-toggle-sm { font-size: 0.45rem; padding: 1px 4px; }
            .card-panel-header h4 { font-size: 0.65rem; }
            .card-panel-header .print-actions button { font-size: 0.4rem; padding: 1px 4px; }
            .card-panel-header .card-count { font-size: 0.55rem; }
        }
    </style>
</head>
<body>
<div class="app-container" id="app">
    <!-- Header - Kompakt -->
    <div class="app-header">
        <div class="app-title">
            <h1><i class="fas fa-recycle"></i>ASZ Asten</h1>
            <span class="badge"><i class="fas fa-map-pin"></i> 106</span>
            <div class="title-icons">
                <i class="fas fa-clipboard-list" title="Frachtliste"></i>
                <i class="fas fa-desktop" title="Büro-Dashboard"></i>
            </div>
        </div>
        <div class="app-status">
            <button class="theme-toggle" id="themeToggle" title="Theme umschalten">
                <i class="fas fa-moon" id="themeIcon"></i> <span id="themeLabel">Dunkel</span>
            </button>
            <div class="sync-status">
                <span class="dot" id="syncDot"></span>
                <span id="syncLabel">sync</span>
            </div>
            <div class="view-toggle">
                <button class="active" data-view="terminal" id="viewTerminalBtn"><i class="fas fa-terminal"></i></button>
                <button data-view="office" id="viewOfficeBtn"><i class="fas fa-list"></i></button>
            </div>
        </div>
    </div>

    <!-- Main Grid - 3 Spalten -->
    <div class="app-grid">
        <!-- Linke Spalte: Materialauswahl -->
        <div class="terminal-panel" id="terminalPanel">
            <div class="filter-bar">
                <input type="text" id="materialSearch" placeholder="🔍 Suchen" inputmode="search">
                <div class="block-selector">
                    <span>Block:</span>
                    <button class="block-btn active" data-block="all">Alle</button>
                    <button class="block-btn" data-block="1000">1000</button>
                    <button class="block-btn" data-block="2000">2000</button>
                    <button class="block-btn" data-block="3000">3000</button>
                    <button class="block-btn" data-block="4000">4000</button>
                    <button class="block-btn" data-block="4300">4300</button>
                    <button class="block-btn" data-block="9000">9000</button>
                </div>
            </div>
            <div class="material-list" id="materialListContainer"></div>
            <div class="terminal-actions">
                <button class="clear-btn" id="clearBasketBtn"><i class="fas fa-trash-alt"></i> Leeren</button>
                <button class="sample-btn" id="addSampleBtn"><i class="fas fa-plus-circle"></i> Beispiel</button>
                <button class="sync-btn" id="syncNowBtn"><i class="fas fa-sync-alt"></i> Sync</button>
            </div>
        </div>

        <!-- Mittlere Spalte: Karteikärtchen -->
        <div class="card-panel" id="cardPanel">
            <div class="card-panel-header">
                <h4><i class="fas fa-id-card"></i> Karteikärtchen</h4>
                <div class="print-actions">
                    <button id="printSingleBtn" title="Aktuelle Karte drucken"><i class="fas fa-print"></i> Einzel</button>
                    <button id="printAllBtn" title="Alle Karten drucken"><i class="fas fa-print"></i> Alle</button>
                </div>
                <span class="card-count" id="cardCountLabel">0</span>
            </div>
            <div class="card-stack-container" id="cardStackContainer">
                <div class="card-empty">Keine Karteikärtchen<br>Füge Materialien hinzu</div>
            </div>
            <div class="card-dots" id="cardDots"></div>
            <div class="card-nav">
                <button id="cardPrevBtn" disabled><i class="fas fa-chevron-left"></i></button>
                <span class="counter" id="cardCounter">0 / 0</span>
                <button id="cardNextBtn" disabled><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <!-- Rechte Spalte: Frachtliste -->
        <div class="office-panel hidden" id="officePanel">
            <div class="office-header">
                <h3><i class="fas fa-clipboard-list"></i> Frachtliste</h3>
                <span class="count-badge" id="officeCount">0</span>
            </div>
            <div class="office-list" id="officeListContainer">
                <div class="office-empty">📭 Keine Fracht</div>
            </div>
            <div class="office-footer">

        // ============================================================

            try {

            const container = document.querySelector('.app-container');
            if (currentDesign === 'material') {
                container.classList.add('material-design');

                else container.classList.remove('dark-theme');
                document.documentElement.style.setProperty('--font-family', "'Roboto', 'Segoe UI', system-ui, sans-serif");
            } else {
                container.classList.remove('material-design');
                container.classList.remove('dark-theme');
                document.documentElement.style.setProperty('--font-family', "'Segoe UI', Roboto, system-ui, sans-serif");
                bootstrapCss.disabled = false;
            }
            if (darkTheme) {
                document.documentElement.setAttribute('data-bs-theme', 'dark');
                themeIcon.className = 'fas fa-moon';
                themeLabel.textContent = 'Dunkel';
                themeIconSm.className = 'fas fa-moon';
            } else {
                document.documentElement.setAttribute('data-bs-theme', 'light');
                themeIcon.className = 'fas fa-sun';
                themeLabel.textContent = 'Hell';
                themeIconSm.className = 'fas fa-sun';

            try { localStorage.setItem(DESIGN_KEY, currentDesign); } catch (e) {}
            designBootstrapBtn.classList.toggle('active', currentDesign === 'bootstrap');
            designMaterialBtn.classList.toggle('active', currentDesign === 'material');
        }

        function setDesign(design) {
            currentDesign = design;
            applyDesign();
            renderAll();
        }

        function loadTheme() {
            try {
                const stored = localStorage.getItem(THEME_KEY);
                if (stored !== null) darkTheme = stored === 'true';
            } catch (e) {}
            applyDesign();
        }

        function toggleTheme() {
            darkTheme = !darkTheme;
            applyDesign();
        }

        themeToggle.addEventListener('click', toggleTheme);
        themeToggleSm.addEventListener('click', toggleTheme);

        // ============================================================
        //  LOCAL STORAGE
        // ============================================================

        function loadFromStorage() {
            try {
                const stored = localStorage.getItem(STORAGE_KEY);
                if (stored) {
                    const data = JSON.parse(stored);
                    basket = data.basket || [];
                    syncHistory = data.history || [];
                    return true;
                }
                return false;
            } catch (e) { return false; }
        }

        function saveToStorage() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    basket: basket,
                    history: syncHistory,
                    lastUpdated: new Date().toISOString()
                }));
                return true;
            } catch (e) { return false; }
        }

        function loadHistory() {
            try {
                const stored = localStorage.getItem(HISTORY_KEY);
                if (stored) syncHistory = JSON.parse(stored);
            } catch (e) { syncHistory = []; }
        }

        function saveHistory() {
            try { localStorage.setItem(HISTORY_KEY, JSON.stringify(syncHistory)); } catch (e) {}
        }

        // ============================================================
        //  BASKET HELPER
        // ============================================================

        function getItemCount(code) {
            return basket.filter(item => item.code === code).length;
        }

        function getTotalItems() {
            return basket.length;
        }

        function addToBasket(code) {
            const mat = materials.find(m => m.code === code);
            if (!mat) return;
            basket.push({ ...mat, id: Date.now() + '_' + Math.random().toString(36).substr(2, 6) });
            saveToStorage();
            addSyncHistory('add', `${mat.code} · ${mat.desc} (+1)`);
            renderAll();
        }

        function removeFromBasket(code) {
            const idx = basket.findIndex(item => item.code === code);
            if (idx === -1) return;
            basket.splice(idx, 1);
            if (currentCardIndex >= basket.length) currentCardIndex = Math.max(0, basket.length - 1);
            saveToStorage();
            addSyncHistory('remove', `${code} (-1)`);
            renderAll();
        }

        function removeSpecificItem(id) {
            const idx = basket.findIndex(item => item.id === id);
            if (idx === -1) return;
            basket.splice(idx, 1);
            if (currentCardIndex >= basket.length) currentCardIndex = Math.max(0, basket.length - 1);
            saveToStorage();
            addSyncHistory('remove', `Einzelnes Item entfernt`);
            renderAll();
        }

        function clearBasket() {
            basket = [];
            currentCardIndex = 0;
            saveToStorage();
            addSyncHistory('clear', 'Alle Artikel entfernt');
            renderAll();
        }

        // ============================================================
        //  DRUCK FUNKTIONEN
        // ============================================================

        function printSingleCard() {
            if (basket.length === 0) return;
            printCards([basket[currentCardIndex]]);
        }

            if (basket.length === 0) return;
            printCards(basket);
        }

// ============================================================
//  RENDER FUNKTIONEN
// ============================================================

function renderAll() {
renderMaterialList();
renderCardStack();
updateOfficeDashboard();
updateSyncStatus(true);
}

function renderMaterialList() {
const searchTerm = searchInput.value.toLowerCase().trim();
let filtered = materials.filter(m => {
if (activeBlock !== 'all' && m.block !== activeBlock) return false;
if (searchTerm) {
return m.code.includes(searchTerm) || m.desc.toLowerCase().includes(searchTerm);
}
return true;
});
if (filtered.length === 0) {
materialListEl.innerHTML = `<div style="padding: 20px 10px; color: var(--text-muted); text-align:center;font-size:0.85rem;">Keine Materialien</div>`;
return;
}
let html = '';
filtered.forEach(m => {
const count = getItemCount(m.code);
html += `
    <div class="material-item">
        <span class="code">${m.code}</span>
        <span class="desc">${m.desc}</span>
        <span class="container-badge"><i class="fas fa-box"></i> ${m.container}</span>
        <div class="item-controls">
            <button class="qty-btn minus-btn" data-code="${m.code}" ${count === 0 ? 'disabled' : ''}>
                <i class="fas fa-minus"></i>
            </button>
            <span class="item-count ${count === 0 ? 'zero' : ''}">${count}</span>
            <button class="qty-btn plus-btn" data-code="${m.code}">
                <i class="fas fa-plus"></i>
            </button>
        </div>
    </div>
`;
});
materialListEl.innerHTML = html;

document.querySelectorAll('.plus-btn').forEach(btn => {
btn.addEventListener('click', function() {
addToBasket(this.dataset.code);
});
});
document.querySelectorAll('.minus-btn').forEach(btn => {
btn.addEventListener('click', function() {
removeFromBasket(this.dataset.code);
});
});
}

function renderCardStack() {
if (basket.length === 0) {
cardStackContainer.innerHTML = `<div class="card-empty">Keine Karteikärtchen<br>Füge Materialien hinzu</div>`;
cardDots.innerHTML = '';
cardCounter.textContent = '0 / 0';
cardCountLabel.textContent = '0';
cardPrevBtn.disabled = true;
cardNextBtn.disabled = true;
printSingleBtn.disabled = true;
printAllBtn.disabled = true;
return;
}

if (currentCardIndex >= basket.length) currentCardIndex = basket.length - 1;
if (currentCardIndex < 0) currentCardIndex = 0;

let html = '<div class="card-stack">';
const total = basket.length;
const activeIdx = currentCardIndex;

basket.forEach((item, idx) => {
let positionClass = 'hidden';
if (idx === activeIdx) positionClass = 'active';
else if (idx === activeIdx - 1) positionClass = 'prev';
else if (idx === activeIdx + 1) positionClass = 'next';
else positionClass = 'hidden';

html += `
    <div class="card-item ${positionClass}" data-index="${idx}">
        <span class="card-index">${idx + 1} / ${total}</span>
        <div class="card-site">ASZ Asten · 106</div>
        <div><span class="card-code">${item.code}</span> · <span class="card-container">${item.container}</span></div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-select-hint"><i class="fas fa-hand-pointer"></i> Zum Auswählen</div>
    </div>
`;
});
html += '</div>';
cardStackContainer.innerHTML = html;

cardCountLabel.textContent = total;
printSingleBtn.disabled = false;
printAllBtn.disabled = false;

let dotsHtml = '';
for (let i = 0; i < total; i++) {
dotsHtml += `<button class="card-dot ${i === activeIdx ? 'active' : ''}" data-index="${i}"></button>`;
}
cardDots.innerHTML = dotsHtml;
document.querySelectorAll('.card-dot').forEach(dot => {
dot.addEventListener('click', function() {
const idx = parseInt(this.dataset.index);
if (idx !== currentCardIndex) {
currentCardIndex = idx;
renderCardStack();
}
});
});

cardCounter.textContent = `${activeIdx + 1} / ${total}`;
cardPrevBtn.disabled = (activeIdx === 0);
cardNextBtn.disabled = (activeIdx === total - 1);

document.querySelectorAll('.card-item').forEach(card => {
card.addEventListener('click', function() {
const idx = parseInt(this.dataset.index);
if (idx !== currentCardIndex && idx >= 0 && idx < basket.length) {
currentCardIndex = idx;
renderCardStack();
}
});
});

setupCardSwipe();
}

function updateOfficeDashboard() {
const list = document.getElementById('officeListContainer');
const count = document.getElementById('officeCount');

if (basket.length === 0) {
list.innerHTML = `<div class="office-empty">📭 Keine Fracht</div>`;
count.textContent = '0';
return;
}

let html = '';
basket.forEach((item, idx) => {
const time = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
html += `
    <div class="office-item">
        <span class="o-code">${item.code}</span>
        <span class="o-desc">${item.desc}</span>
        <span class="o-container">${item.container}</span>
        <span class="o-time">${time}</span>
        <button class="o-delete" data-id="${item.id}"><i class="fas fa-times"></i></button>
    </div>
`;
});
list.innerHTML = html;
count.textContent = basket.length;

document.querySelectorAll('.o-delete').forEach(btn => {
btn.addEventListener('click', function() {
removeSpecificItem(this.dataset.id);
});
});

if (syncHistory.length > 0) {
const last = new Date(syncHistory[0].timestamp);
officeLastSync.textContent = `Sync: ${last.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' })}`;
} else {
officeLastSync.textContent = 'Sync: —';
}
}

function performSync() {
const remoteData = loadFromStorage() ? { basket: basket, history: syncHistory } : null;
if (remoteData && remoteData.basket) {
const localIds = new Set(basket.map(item => item.id));
remoteData.basket.forEach(item => {
if (!localIds.has(item.id)) basket.push(item);
});
syncHistory = remoteData.history || [];
saveToStorage();
addSyncHistory('sync', `Sync durchgeführt (${basket.length} Artikel)`);
} else {
saveToStorage();
addSyncHistory('sync', `Initialer Sync (${basket.length} Artikel)`);
}
renderAll();
updateSyncStatus(true);
return true;
}

function addSyncHistory(action, message) {
const entry = {
timestamp: new Date().toISOString(),
action: action,
message: message,
count: getTotalItems()
};
syncHistory.unshift(entry);
if (syncHistory.length > 100) syncHistory = syncHistory.slice(0, 100);
saveHistory();
}

function updateSyncStatus(connected) {
const dot = document.getElementById('syncDot');
const label = document.getElementById('syncLabel');
const footerIcon = document.getElementById('footerSyncIcon');
const footerText = document.getElementById('footerSyncText');

if (connected) {
dot.className = 'dot';
label.textContent = 'sync';
footerIcon.className = 'fas fa-circle';
footerIcon.style.color = 'var(--dot-color)';
footerText.textContent = 'synchronisiert';
} else {
dot.className = 'dot offline';
label.textContent = 'offline';
footerIcon.className = 'fas fa-circle offline';
footerText.textContent = 'offline';
}
}

// ----- Swipe -----
let touchStartX = 0, touchStartY = 0;
let isSwiping = false;
let mouseDownX = 0, mouseDownY = 0;
let isMouseDragging = false;

function setupCardSwipe() {
const container = cardStackContainer;
if (!container) return;
container.removeEventListener('touchstart', handleTouchStart);
container.removeEventListener('touchmove', handleTouchMove);
container.removeEventListener('touchend', handleTouchEnd);
container.removeEventListener('mousedown', handleMouseDown);
document.removeEventListener('mousemove', handleMouseMove);
document.removeEventListener('mouseup', handleMouseUp);
container.addEventListener('touchstart', handleTouchStart, { passive: true });
container.addEventListener('touchmove', handleTouchMove, { passive: false });
container.addEventListener('touchend', handleTouchEnd, { passive: true });
container.addEventListener('mousedown', handleMouseDown);
document.addEventListener('mousemove', handleMouseMove);
document.addEventListener('mouseup', handleMouseUp);
}

function handleTouchStart(e) {
const touch = e.touches[0];
touchStartX = touch.clientX;
touchStartY = touch.clientY;
isSwiping = false;
}

function handleTouchMove(e) {
if (touchStartX === 0) return;
const touch = e.touches[0];
const deltaX = touch.clientX - touchStartX;
const deltaY = touch.clientY - touchStartY;
if (Math.abs(deltaX) > 15 && Math.abs(deltaX) > Math.abs(deltaY) * 0.7) {
isSwiping = true;
e.preventDefault();
const activeCard = document.querySelector('.card-item.active');
if (activeCard) {
const clamped = Math.max(-80, Math.min(80, deltaX));
activeCard.style.transform = `translateX(${clamped}px) scale(1) rotate(${clamped * 0.02}deg)`;
activeCard.style.transition = 'none';
}
}
}

function handleTouchEnd(e) {
if (!isSwiping || touchStartX === 0) {
touchStartX = 0;
resetCardTransform();
return;
}
const touch = e.changedTouches[0];
const deltaX = touch.clientX - touchStartX;
touchStartX = 0;
isSwiping = false;
resetCardTransform();
if (deltaX < -50 && currentCardIndex < basket.length - 1) {
currentCardIndex++;
renderCardStack();
} else if (deltaX > 50 && currentCardIndex > 0) {
currentCardIndex--;
renderCardStack();
}
}

function handleMouseDown(e) {
if (basket.length === 0) return;
mouseDownX = e.clientX;
mouseDownY = e.clientY;
isMouseDragging = false;
}

function handleMouseMove(e) {
if (mouseDownX === 0) return;
const deltaX = e.clientX - mouseDownX;
const deltaY = e.clientY - mouseDownY;
if (Math.abs(deltaX) > 15 && Math.abs(deltaX) > Math.abs(deltaY) * 0.7) {
isMouseDragging = true;
const activeCard = document.querySelector('.card-item.active');
if (activeCard) {
const clamped = Math.max(-80, Math.min(80, deltaX));
activeCard.style.transform = `translateX(${clamped}px) scale(1) rotate(${clamped * 0.02}deg)`;
activeCard.style.transition = 'none';
}
}
}

function handleMouseUp(e) {
if (mouseDownX === 0) return;
const deltaX = e.clientX - mouseDownX;
const wasDragging = isMouseDragging;
mouseDownX = 0;
isMouseDragging = false;
resetCardTransform();
if (wasDragging) {
if (deltaX < -50 && currentCardIndex < basket.length - 1) {
currentCardIndex++;
renderCardStack();
} else if (deltaX > 50 && currentCardIndex > 0) {
currentCardIndex--;
renderCardStack();
}
}
}

function resetCardTransform() {
const activeCard = document.querySelector('.card-item.active');
if (activeCard) {
activeCard.style.transition = 'transform 0.3s cubic-bezier(0.23, 1, 0.32, 1)';
activeCard.style.transform = '';
setTimeout(() => { if (activeCard) activeCard.style.transition = ''; }, 350);
}
}

// ============================================================
//  NAVIGATION & EVENTS
// ============================================================

cardPrevBtn.addEventListener('click', function() {
if (currentCardIndex > 0) { currentCardIndex--; renderCardStack(); }
});
cardNextBtn.addEventListener('click', function() {
if (currentCardIndex < basket.length - 1) { currentCardIndex++; renderCardStack(); }
});

document.addEventListener('keydown', function(e) {
if (basket.length === 0) return;
if (e.target.tagName === 'INPUT') return;
if (e.key === 'ArrowLeft' && currentCardIndex > 0) {
e.preventDefault(); currentCardIndex--; renderCardStack();
} else if (e.key === 'ArrowRight' && currentCardIndex < basket.length - 1) {
e.preventDefault(); currentCardIndex++; renderCardStack();
}
});

printSingleBtn.addEventListener('click', printSingleCard);
printAllBtn.addEventListener('click', printAllCards);

document.getElementById('viewTerminalBtn').addEventListener('click', function() {
currentView = 'terminal';
document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
this.classList.add('active');
terminalPanel.classList.remove('hidden');
officePanel.classList.add('hidden');
cardPanel.classList.remove('hidden');
});
document.getElementById('viewOfficeBtn').addEventListener('click', function() {
currentView = 'office';
document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
this.classList.add('active');
terminalPanel.classList.add('hidden');
officePanel.classList.remove('hidden');
cardPanel.classList.add('hidden');
updateOfficeDashboard();
});

designBootstrapBtn.addEventListener('click', function() { setDesign('bootstrap'); });
designMaterialBtn.addEventListener('click', function() { setDesign('material'); });

document.getElementById('clearBasketBtn').addEventListener('click', function() {
if (basket.length === 0) return;
clearBasket();
});

document.getElementById('addSampleBtn').addEventListener('click', function() {
const sampleCodes = ['2110', '2120', '4050'];
let added = 0;
sampleCodes.forEach(code => {
const mat = materials.find(m => m.code === code);
if (mat) {
basket.push({ ...mat, id: Date.now() + '_' + Math.random().toString(36).substr(2, 6) });
added++;
}
});
if (added > 0) {
currentCardIndex = basket.length - 1;
saveToStorage();
addSyncHistory('sample', `${added} Beispiel-Artikel hinzugefügt`);
renderAll();
}
});

document.getElementById('syncNowBtn').addEventListener('click', function() {
const btn = this;
btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
btn.disabled = true;
setTimeout(() => {
performSync();
btn.innerHTML = '<i class="fas fa-sync-alt"></i> Sync';
btn.disabled = false;
updateOfficeDashboard();
}, 400);
});

document.getElementById('officeClearBtn').addEventListener('click', function() {
if (basket.length === 0) return;
if (confirm('Alle Frachtdaten löschen?')) clearBasket();
});

document.querySelectorAll('.block-btn').forEach(btn => {
btn.addEventListener('click', function() {
document.querySelectorAll('.block-btn').forEach(b => b.classList.remove('active'));
this.classList.add('active');
activeBlock = this.dataset.block;
renderMaterialList();
});
});

searchInput.addEventListener('input', renderMaterialList);

// ============================================================
//  INITIALISIERUNG
// ============================================================

function init() {
loadDesign();
loadTheme();
const hasData = loadFromStorage();
if (!hasData || basket.length === 0) {
basket = [];
syncHistory = [];
saveToStorage();
}
loadHistory();

const isMobile = window.innerWidth < 768;
deviceInfo.textContent = isMobile ? '📱 Tablet' : '💻 PC';

renderAll();

setTimeout(() => {
performSync();
updateOfficeDashboard();
}, 800);

setInterval(() => {
performSync();
updateOfficeDashboard();
}, 30000);

console.log('🔄 ASZ Asten System gestartet');
console.log(`📦 ${getTotalItems()} Artikel, 📚 ${materials.length} LAVU-Artikel`);
console.log(`🎨 Design: ${currentDesign}`);
}

init();
})();
</script>
