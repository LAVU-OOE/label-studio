<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to LAVU-OOE...</title>
    <meta http-equiv="refresh" content="0; url=https://lavu-ooe.github.io/">
    <link rel="canonical" href="https://lavu-ooe.github.io/">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
      :root {
        --bg-color: #0f172a;       /* Deep slate/navy aviation background */
        --card-bg: #1e293b;        /* Lighter slate for the card */
        --text-main: #f8fafc;      /* Crisp white text */
        --text-muted: #94a3b8;     /* Muted gray text */
        --accent-blue: #38bdf8;    /* Sky blue accent for links/buttons */
        --accent-hover: #7dd3fc;   /* Hover state */
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
      }

      .redirect-container {
        background-color: var(--card-bg);
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        text-align: center;
        max-width: 450px;
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      /* Animated loading ring */
      .spinner {
        display: inline-block;
        width: 40px;
        height: 40px;
        border: 3px solid rgba(56, 189, 248, 0.2);
        border-radius: 50%;
        border-top-color: var(--accent-blue);
        animation: spin 1s ease-in-out infinite;
        margin-bottom: 1.5rem;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 0.75rem;
        letter-spacing: -0.025em;
      }

      p {
        color: var(--text-muted);
        font-size: 0.95rem;
        line-height: 1.5;
        margin-bottom: 2rem;
      }

      .btn-link {
        display: inline-block;
        background-color: var(--accent-blue);
        color: #0f172a;
        font-weight: 500;
        text-decoration: none;
        padding: 0.75rem 1.5rem;
        border-radius: 6px;
        transition: background-color 0.2s ease, transform 0.1s ease;
      }

      .btn-link:hover {
        background-color: var(--accent-hover);
      }

      .btn-link:active {
        transform: scale(0.98);
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>

    <div class="redirect-container">
      <div class="spinner"></div>
      <h1>Moving to LAVU-OOE</h1>
      <p>We are transferring you to our new app-drawer. If it doesn't automatically redirect you in a few seconds, click below.</p>
      <a class="btn-link" href="https://lavu-ooe.github.io/label-studio/">Proceed to LAVU-OOE Central software infrastructure</a>
    </div>

  </body>
</html>
