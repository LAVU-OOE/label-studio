<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAVU OÖ - Etiketten-Druckstudio v7</title>
    <style>
        /* ==========================================
           BENUTZEROBERFLÄCHE (Wird nicht gedruckt)
           ========================================== */
        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            margin: 0;
            padding: 20px;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .main-card {
            background: #ffffff;
            width: 100%;
            max-width: 750px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(26, 75, 96, 0.08);
            padding: 35px;
            box-sizing: border-box;
            border: 1px solid #eef2f5;
            position: relative;
        }

        /* App-Header mit Logo & Dynamic Right Text */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #eef2f5;
            padding-bottom: 20px;
            margin-bottom: 30px;
        }

        .app-header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .app-header-title {
            color: #1a4b60;
            font-size: 1.5rem;
            font-weight: bold;
            line-height: 1.1;
        }

        .app-header-subtitle {
            font-size: 0.85rem;
            color: #6cb4db;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            margin-top: 3px;
        }

        .app-header-right {
            color: #27ae60;
            font-size: 1.1rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #e8f8f5;
            padding: 8px 16px;
            border-radius: 8px;
            border-left: 4px solid #27ae60;
            box-shadow: 0 2px 6px rgba(39, 174, 96, 0.04);
        }

        /* Integriertes Hauptlayout: Dashboard-Struktur */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 35px;
            align-items: center;
            margin-bottom: 30px;
        }

        /* Linke Spalte: Integrierte Miniaturansicht */
        .preview-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #f8fafc;
            padding: 20px;
            border-radius: 12px;
            border: 1px dashed #cbd5e1;
        }

        .sidebar-title {
            font-size: 0.75rem;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .thumbnail-wrapper {
            position: relative;
            width: 168px;   /* 210mm * 0.20 Faktor */
            height: 238px;  /* 297mm * 0.20 Faktor */
            border: 1px solid #cbd5e1;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(0,0,0,0.06);
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .thumbnail-wrapper:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 24px rgba(26, 75, 96, 0.15);
            border-color: #1a4b60;
        }

        .scaled-sheet-container {
            transform: scale(0.20);
            transform-origin: top left;
            width: 210mm;
            height: 297mm;
            pointer-events: none;
        }

        .thumbnail-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(26, 75, 96, 0.9);
            color: white;
            font-size: 0.75rem;
            font-weight: bold;
            text-align: center;
            padding: 8px 0;
            transition: background 0.2s;
            backdrop-filter: blur(2px);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
        }

        .thumbnail-wrapper:hover .thumbnail-overlay {
            background: rgba(39, 174, 96, 0.95);
        }

        /* Rechte Spalte: Detail-Zusammenfassung & Aktionen */
        .info-panel {
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
        }

        .info-title {
            font-size: 0.85rem;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 12px;
        }

        .summary-box {
            background: #f8fafc;
            border-left: 4px solid #6cb4db;
            padding: 16px 20px;
            border-radius: 0 12px 12px 0;
            margin-bottom: 25px;
            border-top: 1px solid #e2e8f0;
            border-right: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
        }

        .summary-item {
            margin-bottom: 8px;
            font-size: 1rem;
            color: #334155;
        }
        .summary-item:last-child { margin-bottom: 0; }
        .summary-label { font-weight: 600; color: #1a4b60; width: 110px; display: inline-block; }

        .action-buttons {
            display: flex;
            gap: 15px;
        }

        button {
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-primary {
            background-color: #27ae60;
            color: white;
            flex: 2;
            box-shadow: 0 4px 12px rgba(39, 174, 96, 0.2);
        }

        .btn-primary:hover {
            background-color: #219653;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(39, 174, 96, 0.25);
        }

        .btn-secondary {
            background-color: #1a4b60;
            color: white;
            flex: 1;
            box-shadow: 0 4px 12px rgba(26, 75, 96, 0.15);
        }

        .btn-secondary:hover {
            background-color: #113342;
            transform: translateY(-1px);
        }

        /* ==========================================
           MODALS & STRUKTUREN (Settings & Tabs)
           ========================================== */
        .modal-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 34, 43, 0.55);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 16px;
            width: 92%;
            max-width: 580px;
            box-shadow: 0 20px 40px rgba(15, 34, 43, 0.2);
            position: relative;
        }

        .preview-modal-content {
            max-width: 230mm;
            max-height: 94vh;
            display: flex;
            flex-direction: column;
            padding: 20px 30px;
        }

        .modal-body-scroll {
            overflow-y: auto;
            flex: 1;
            padding: 25px;
            background: #f1f5f9;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.05);
        }

        .modal-header {
            font-size: 1.35rem;
            font-weight: bold;
            color: #1a4b60;
            margin-bottom: 20px;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-close-x {
            background: transparent;
            font-size: 1.8rem;
            color: #94a3b8;
            padding: 0;
            cursor: pointer;
            line-height: 1;
        }
        .btn-close-x:hover { color: #ef4444; }

        /* Tabs innerhalb der Einstellungen */
        .mode-switcher {
            display: flex;
            background: #f1f5f9;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #e2e8f0;
        }

        .mode-tab {
            flex: 1;
            text-align: center;
            padding: 10px 15px;
            font-weight: bold;
            font-size: 0.95rem;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .mode-tab.active {
            background: #1a4b60;
            color: white;
            box-shadow: 0 2px 6px rgba(26, 75, 96, 0.15);
        }

        .form-section {
            display: none;
            animation: fadeIn 0.25s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 6px;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        input, select {
            padding: 11px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #334155;
            background-color: #f8fafc;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #6cb4db;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(108, 180, 219, 0.15);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 20px;
            border-top: 1px solid #f1f5f9;
            padding-top: 15px;
        }

        .btn-save-defaults {
            background-color: #3498db;
            color: white;
        }
        .btn-save-defaults:hover { background-color: #2980b9; }

        .btn-cancel {
            background-color: #f1f5f9;
            color: #475569;
        }
        .btn-cancel:hover { background-color: #e2e8f0; }

        /* ==========================================
           DRUCK-RASTER & Avery 27 ETIKETTEN-DESIGN
           ========================================== */
        .page-container {
            background: #ffffff;
            width: 210mm;
            height: 297mm;
            box-shadow: 0 4px 25px rgba(0,0,0,0.12);
            box-sizing: border-box;
        }

        .print-sheet {
            width: 210mm;
            height: 297mm;
            box-sizing: border-box;
            padding-top: 4.5mm;
            padding-bottom: 4.5mm;
            display: grid;
            grid-template-columns: repeat(3, 70mm);
            grid-template-rows: repeat(9, 32mm);
            background: white;
        }

        .label {
            width: 70mm;
            height: 32mm;
            box-sizing: border-box;
            padding: 3.5mm 5mm 4mm 5mm;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: Arial, "Helvetica Neue", Helvetica, sans-serif;
            background-color: #fff;
            border: 1px dashed #e2e8f0;
            overflow: hidden;
        }

        .label-top {
            text-align: right;
            font-size: 11pt;
            font-weight: bold;
            color: #1a4b60;
            letter-spacing: 0.3px;
        }

        .label-middle {
            display: flex;
            align-items: baseline;
            margin-top: -1.5mm;
            margin-bottom: auto;
        }

        .label-middle .num {
            font-size: 30pt;
            font-weight: bold;
            color: #54a0cc;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .label-middle .sep {
            font-size: 24pt;
            color: #1a4b60;
            font-weight: bold;
            margin: 0 6px;
            position: relative;
            top: -2px;
        }

        .label-middle .suffix {
            font-size: 16pt;
            font-weight: bold;
            color: #1a4b60;
        }

        .label-bottom {
            font-size: 11.5pt;
            color: #111111;
            font-weight: bold;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.1;
            letter-spacing: -0.1px;
        }

        .label.empty {
            border: 1px dashed #f8fafc;
            background-color: #fafbfc;
        }

        /* Versteckter Container für direkten Druck außerhalb des Modals */
        #hiddenPrintContainer {
            display: none;
        }

        /* Responsive Layout Anpassung */
        @media (max-width: 700px) {
            .dashboard-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }
            .preview-sidebar {
                order: -1;
            }
            .action-buttons {
                flex-direction: column;
            }
        }

        /* ==========================================
           REINE DRUCKEINSTELLUNGEN (@media print)
           ========================================== */
        @media print {
            body * {
                display: none !important;
            }
            #hiddenPrintContainer, #hiddenPrintContainer *, #labelSheetDirect, #labelSheetDirect * {
                display: block !important;
            }
            #labelSheetDirect {
                display: grid !important;
                position: absolute !important;
                top: 0 !important;
                left: 0 !important;
            }
            .page-container {
                box-shadow: none !important;
                margin: 0 !important;
                width: 210mm !important;
                height: 297mm !important;
            }
            .label {
                border: none !important;
            }
            @page {
                size: A4;
                margin: 0;
            }
        }
    </style>
</head>
<body>

    <div class="main-card">
        
        <div class="app-header">
            <div class="app-header-left">
                <svg width="42" height="42" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="46" fill="#1a4b60"/>
                    <path d="M34 68 L50 32 L66 68 Z" stroke="#6cb4db" stroke-width="7" stroke-linejoin="round" fill="none"/>
                    <path d="M41 53 L59 53" stroke="#6cb4db" stroke-width="6" stroke-linecap="round"/>
                    <path d="M22 36 Q50 12 78 36" stroke="#27ae60" stroke-width="6" stroke-linecap="round" fill="none"/>
                </svg>
                <div>
                    <div class="app-header-title">LAVU OÖ</div>
                    <div class="app-header-subtitle">Etiketten-Druckstudio</div>
                </div>
            </div>
            <div class="app-header-right" id="headerStation">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <span id="headerStationText">106 - ASZ Asten</span>
            </div>
        </div>
        
        <div class="dashboard-grid">
            
            <div class="preview-sidebar">
                <div class="sidebar-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    Live-Vorschau
                </div>
                <div class="thumbnail-wrapper" onclick="openPreviewModal()" title="Klicken für vollständige A4-Großansicht">
                    <div class="scaled-sheet-container">
                        <div class="print-sheet" id="thumbnailSheet"></div>
                    </div>
                    <div class="thumbnail-overlay">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                        Großansicht
                    </div>
                </div>
            </div>
            
            <div class="info-panel">
                <div class="info-title">Aktuelle Konfiguration</div>
                
                <div class="summary-box">
                    <div class="summary-item"><span class="summary-label">Abfallart:</span> <span id="sumBezeichnung">-</span></div>
                    <div class="summary-item"><span class="summary-label">Artikel-Nr:</span> <span id="sumArtNr">-</span></div>
                    <div class="summary-item"><span class="summary-label">Zusatztext:</span> <span id="sumSuffix">-</span></div>
                    <div class="summary-item"><span class="summary-label">Menge / Start:</span> <span id="sumMenge">-</span></div>
                </div>
                
                <div class="action-buttons">
                    <button class="btn-primary" onclick="triggerDirectPrint()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                        Jetzt Ausdrucken
                    </button>
                    
                    <button class="btn-secondary" onclick="openSettings()">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                        Einstellungen
                    </button>
                </div>
            </div>
            
        </div>
    </div>

    <div id="settingsModal" class="modal-backdrop" onclick="closeSettingsViaBackdrop(event)">
        <div class="modal-content">
            <div class="modal-header">
                <span>Druck- & Standorteinstellungen</span>
                <button class="btn-close-x" onclick="closeSettings()">&times;</button>
            </div>
            
            <div class="form-group" style="margin-bottom: 20px;">
                <label for="inputTop">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                    Standort (ASZ Niederlassung OÖ):
                </label>
                <select id="inputTop" onchange="updatePreview()">
                    <optgroup label="Bezirk Linz-Land">
                        <option value="106 - ASZ Asten" selected>106 - ASZ Asten</option>
                        <option value="ASZ Ansfelden">ASZ Ansfelden</option>
                        <option value="ASZ Enns">ASZ Enns</option>
                        <option value="ASZ Hörsching">ASZ Hörsching</option>
                        <option value="ASZ Leonding">ASZ Leonding</option>
                        <option value="ASZ Neuhofen">ASZ Neuhofen</option>
                        <option value="ASZ Pasching">ASZ Pasching</option>
                        <option value="ASZ St. Florian">ASZ St. Florian</option>
                        <option value="ASZ Traun">ASZ Traun</option>
                        <option value="ASZ Wilhering">ASZ Wilhering</option>
                    </optgroup>
                    <optgroup label="Linz Stadt">
                        <option value="ASZ Linz-Nebingerstraße">ASZ Linz-Nebingerstraße</option>
                        <option value="ASZ Linz-Mostnnystraße">ASZ Linz-Mostnnystraße</option>
                        <option value="ASZ Linz-Wiener Straße">ASZ Linz-Wiener Straße</option>
                        <option value="ASZ Linz-Dornach">ASZ Linz-Dornach</option>
                    </optgroup>
                    <optgroup label="Wels & Wels-Land">
                        <option value="ASZ Wels-Nord">ASZ Wels-Nord</option>
                        <option value="ASZ Wels-Süd">ASZ Wels-Süd</option>
                        <option value="ASZ Gunskirchen">ASZ Gunskirchen</option>
                        <option value="ASZ Marchtrenk">ASZ Marchtrenk</option>
                        <option value="ASZ Thalheim">ASZ Thalheim</option>
                    </optgroup>
                    </select>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="inputCount">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="9" x2="15" y2="9"></line><line x1="9" y1="13" x2="15" y2="13"></line><line x1="9" y1="17" x2="13" y2="17"></line></svg>
                        Anzahl Etiketten:
                    </label>
                    <input type="number" id="inputCount" value="9" min="1" max="27" oninput="updatePreview()">
                </div>

                <div class="form-group">
                    <label for="inputStartPos">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                        Start-Position (1-27):
                    </label>
                    <input type="number" id="inputStartPos" value="1" min="1" max="27" oninput="updatePreview()">
                </div>
            </div>

            <div class="mode-switcher">
                <div id="tabSelect" class="mode-tab active" onclick="switchMode('select')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                    Sortiment-Auswahl
                </div>
                <div id="tabInput" class="mode-tab" onclick="switchMode('input')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"></path></svg>
                    Freie Eingabe
                </div>
            </div>
            
            <div id="sectionSelect" class="form-section active">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label for="sortimentSelect">Abfallart wählen:</label>
                    <select id="sortimentSelect" onchange="handlePresetSelection()"></select>
                </div>
            </div>

            <div id="sectionInput" class="form-section">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="inputArtNr">Artikel-Nr.:</label>
                        <input type="text" id="inputArtNr" value="4040" oninput="updatePreview()">
                    </div>
                    
                    <div class="form-group">
                        <label for="inputSuffix">Zusatz Mitte:</label>
                        <input type="text" id="inputSuffix" value="QR-Box" oninput="updatePreview()">
                    </div>

                    <div class="form-group full-width">
                        <label for="inputBezeichnung">Bezeichnung unten:</label>
                        <input type="text" id="inputBezeichnung" value="Elektro-Kleingeräte (ohne Akku)" oninput="updatePreview()">
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button id="btnSaveDefaults" class="btn-save-defaults" onclick="saveDefaults()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                    Standard sichern
                </button>
                <button class="btn-cancel" onclick="closeSettings()">Fertig</button>
            </div>
        </div>
    </div>

    <div id="previewModal" class="modal-backdrop" onclick="closePreviewModalViaBackdrop(event)">
        <div class="modal-content preview-modal-content">
            <div class="modal-header">
                <span>Vollbild-Druckvorschau (A4-Bogen - Avery 27er Layout)</span>
                <button class="btn-close-x" onclick="closePreviewModal()">&times;</button>
            </div>
            <div class="modal-body-scroll">
                <div class="page-container">
                    <div class="print-sheet" id="labelSheetModal"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="window.print()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>
                    Jetzt Ausdrucken
                </button>
                <button class="btn-cancel" onclick="closePreviewModal()">Schließen</button>
            </div>
        </div>
    </div>

    <div id="hiddenPrintContainer">
        <div class="page-container">
            <div class="print-sheet" id="labelSheetDirect"></div>
        </div>
    </div>

    <script>
        const sortimentData = [
            { artNr: "4040", bez: "Elektro-Kleingeräte (ohne Akku)", zusatzMitte: "QR-Box" },
            { artNr: "4010", bez: "Elektro-Großgeräte", zusatzMitte: "Gitterbox" },
            { artNr: "4020", bez: "Kühlgeräte", zusatzMitte: "Großteil" },
            { artNr: "4030", bez: "Bildschirmgeräte", zusatzMitte: "Gitterbox" },
            { artNr: "3000", bez: "Altpapier (Deinking-Qualität)", zusatzMitte: "Container" },
            { artNr: "2100", bez: "Kartonagen (ARA-lizenziert)", zusatzMitte: "Presse" },
            { artNr: "3200", bez: "Alteisen", zusatzMitte: "Mulde" },
            { artNr: "4300", bez: "Altlacke & Werkstättenabfälle", zusatzMitte: "Gefahrgut" }
        ];

        let aktuellerModus = 'select';

        window.onload = function() {
            initDropdown();
            loadDefaults();
        };

        function initDropdown() {
            const select = document.getElementById('sortimentSelect');
            select.innerHTML = '';
            sortimentData.forEach((item, index) => {
                let opt = document.createElement('option');
                opt.value = index;
                opt.innerHTML = `[${item.artNr}] ${item.bez}`;
                select.appendChild(opt);
            });
        }

        function switchMode(mode) {
            aktuellerModus = mode;
            document.getElementById('tabSelect').classList.toggle('active', mode === 'select');
            document.getElementById('tabInput').classList.toggle('active', mode === 'input');
            document.getElementById('sectionSelect').classList.toggle('active', mode === 'select');
            document.getElementById('sectionInput').classList.toggle('active', mode === 'input');
            if (mode === 'select') handlePresetSelection(); else updatePreview();
        }

        function handlePresetSelection() {
            const select = document.getElementById('sortimentSelect');
            const index = select.value;
            if (index !== "" && sortimentData[index]) {
                const item = sortimentData[index];
                document.getElementById('inputArtNr').value = item.artNr;
                document.getElementById('inputSuffix').value = item.zusatzMitte;
                document.getElementById('inputBezeichnung').value = item.bez;
            }
            updatePreview();
        }

        function openSettings() { document.getElementById('settingsModal').style.display = 'flex'; }
        // ... Restliche Funktionen wie updatePreview() für die parallele Bogenbefüllung ...
    </script>
</body>
</html>
